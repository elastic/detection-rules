name: DaC (detection-rules CLI)
description: Bugs, gaps, or docs for the DaC commands in this reference (Kibana import/export, NDJSON repo workflows). Use other channels for Kibana API, Terraform, or broad enhancements.
title: "[DaC] "
labels: ["python", "detections-as-code", "Team: TRADE"]
assignees: []
projects: ["elastic/1268"]

body:
  - type: markdown
    attributes:
      value: |
        This template is for issues **specific to the DaC commands** documented in this reference: the [detection-rules](https://github.com/elastic/detection-rules) CLI as used for custom rules (e.g. `python -m detection_rules …`).

        - If your issue is about the Elastic Security / Kibana **HTTP APIs**, stack limits, or UI behavior, open it against **[Kibana](https://github.com/elastic/kibana/issues)** (or the relevant Elastic product repo), not here.
        - If it is about **Terraform** (Elastic provider, modules, state), use the Terraform / provider issue tracker you rely on.
        - For **broad enhancement requests** not tied to these CLI commands (product vision, unrelated docs), use **Enhancement** / discussion forums as appropriate—this repo tracks the reference and the DaC command surface below.

  - type: markdown
    attributes:
      value: |
        ## Scope (required)

        This issue is about the **detection-rules CLI** workflows in this reference, including:

        | Area | Example commands |
        |------|------------------|
        | **Kibana API sync** | `python -m detection_rules kibana export-rules`, `python -m detection_rules kibana import-rules` |
        | **NDJSON ↔ repo** | `python -m detection_rules import-rules-to-repo …`, `python -m detection_rules export-rules-from-repo …` |

  - type: checkboxes
    id: command_or_doc_area
    attributes:
      label: Command or doc area
      description: "Pick one or more that apply."
      options:
        - label: "`kibana export-rules` / `kibana import-rules`"
        - label: "`import-rules-to-repo`"
        - label: "`export-rules-from-repo`"
        - label: "Other DaC CLI command (name it in the field below)"
        - label: "Documentation in this repo only (link the page/section below)"

  - type: input
    id: other_command_or_doc_link
    attributes:
      label: Other command name or doc link
      description: 'If you chose "Other DaC CLI command" or documentation, name the command or paste the doc path/URL.'
      placeholder: "e.g. command name or docs/…"

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: "What went wrong or what is missing? One short paragraph."
      placeholder: "Describe the issue…"

  - type: textarea
    id: expected_vs_actual
    attributes:
      label: Expected vs actual
      description: "Expected behavior and what you observed (include CLI output snippets if helpful)."
      placeholder: "Expected: …\n\nActual: …"

  - type: textarea
    id: environment
    attributes:
      label: Environment (if relevant)
      description: "Fill in what applies."
      placeholder: |
        detection-rules branch/commit or release:
        Elastic / Kibana version (stack):
        OS / Python version:

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction (if applicable)
      description: "Minimal steps—config (redact secrets), exact command line, and sample inputs if safe to share."
      placeholder: |
        ```bash
        # paste commands here
        ```

  - type: markdown
    attributes:
      value: |
        ## Routing quick reference

        | Topic | Where to raise it |
        |-------|-------------------|
        | Kibana / Elastic Security **REST API**, limits, or server-side import/export behavior | [Kibana](https://github.com/elastic/kibana/issues) (or product-specific tracker) |
        | **Terraform** (provider, Elastic stack as code) | Terraform / provider issue tracker you use |
        | **Enhancements** not specific to these detection-rules DaC commands | Appropriate enhancement or discussion channel for that scope |

  - type: textarea
    id: related_issues
    attributes:
      label: Related issues (optional)
      description: "Links to related issues (Kibana, detection-rules, etc.)."
      placeholder: "- "
