name: ES|QL Validation
on:
    pull_request:
      branches: [ "*" ]

permissions:
  contents: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Detection Rules
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
            fetch-depth: 0
            path: detection-rules

      - name: Check if new or modified rule files are ESQL rules
        id: check-esql
        run: |
          cd detection-rules

          # Check if the event is a push
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Triggered by a push event. Setting run_esql=true."
            echo "run_esql=true" >> $GITHUB_ENV
            exit 0
          fi

          MODIFIED_FILES=$(git diff --name-only --diff-filter=AM HEAD~1 | grep '^rules/.*\.toml$' || true)
          if [ -z "$MODIFIED_FILES" ]; then
            echo "No modified or new .toml files found. Skipping workflow."
            echo "run_esql=false" >> $GITHUB_ENV
            exit 0
          fi

          if ! grep -q 'type = "esql"' $MODIFIED_FILES; then
            echo "No 'type = \"esql\"' found in the modified .toml files. Skipping workflow."
            echo "run_esql=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "run_esql=true" >> $GITHUB_ENV

      - name: Set up Python 3.13
        if: ${{ env.run_esql == 'true' }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          python-version: '3.13'

      - name: Set up JDK 21
        if: ${{ env.run_esql == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Check out elastic/elasticsearch for ES|QL validator build
        if: ${{ env.run_esql == 'true' }}
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: elastic/elasticsearch
          path: elasticsearch
          # Match the stack version the rules currently target. Update alongside
          # detection_rules.schemas.get_latest_stack_version().

      - name: Install dependencies
        if: ${{ env.run_esql == 'true' }}
        run: |
          cd detection-rules
          python -m pip install --upgrade pip
          pip cache purge
          pip install .[dev]

      - name: Test ES|QL Rules
        if: ${{ env.run_esql == 'true' }}
        env:
          # Point the validator's build script at the elasticsearch checkout above.
          # The first compile is slow; gradle build cache speeds up later runs.
          ES_HOME: ${{ github.workspace }}/elasticsearch
        run: |
          cd detection-rules
          python -m detection_rules dev test esql-validation
