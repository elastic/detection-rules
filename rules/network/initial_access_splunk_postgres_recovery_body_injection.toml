[metadata]
creation_date = "2026/06/15"
integration = ["endpoint", "zeek", "corelight", "cisco_ftd"]
maturity = "production"
updated_date = "2026/06/15"

[rule]
author = ["Elastic"]
description = """
Detects CVE-2026-20253 exploit artifacts against the Splunk Enterprise PostgreSQL sidecar recovery endpoints via two
complementary signals. Where endpoint, WAF, or reverse-proxy request-body logging is available, the rule matches
PostgreSQL connection-string injection keywords (`hostaddr=`, `host=`, `passfile=`, `dbname=template1`), path traversal
in the `backupFile` parameter, and known filesystem artifacts (`.pgpass`, `/opt/splunk/etc/apps/`). Where Zeek or
Corelight HTTP logging is available, it matches the empty-password Basic auth credentials
hardcoded in published exploit tooling — all known PoC variants use no password, causing Zeek to record an empty
`url.password` field.
"""
false_positives = [
    """
    Authorized red-team or penetration testing tooling exercising the CVE-2026-20253 exploit chain. Legitimate Splunk
    user activity should never produce PostgreSQL connection-string keywords or path traversal strings in requests to
    these endpoints.
    """,
]
from = "now-9m"
index = ["logs-*", "logs-endpoint.events.network*", "logs-zeek.http*", "logs-corelight.*", "logs-cisco_ftd.*"]
language = "kuery"
license = "Elastic License v2"
name = "Splunk Enterprise PostgreSQL Recovery Endpoint Injection Artifacts"
note = """## Triage and analysis

> **Disclaimer**:
> This investigation guide was created using generative AI technology and has been reviewed to improve its accuracy and relevance. While every effort has been made to ensure its quality, we recommend validating the content and adapting it to suit your specific environment and operational needs.

### Investigating Splunk Enterprise PostgreSQL Recovery Endpoint Injection Artifacts

This rule fires on two distinct signals from the CVE-2026-20253 exploit chain:

**Body injection** (endpoint/WAF/proxy sources): A POST to the recovery endpoints with a body containing
PostgreSQL connection-string keywords (`hostaddr=`, `host=`, `passfile=`, `dbname=template1`),
`backupFile` path traversal, or known filesystem artifacts (`.pgpass`, `/opt/splunk/etc/apps/`). The `database` JSON field is passed directly to `pg_dump` or `pg_restore` as a connection
string, so attacker-supplied keywords override the hardcoded local configuration. The `backupFile`
parameter controls the dump file path, enabling arbitrary file placement.

**Auth credential artifact** (Zeek/Corelight sources): A POST to the recovery endpoints
with an empty password in the HTTP Basic auth header (`url.password : ""`). The exploit passes the
Basic auth username directly to `pg_dump` as a PostgreSQL username — any value works, so this branch
does not filter on specific usernames. All known PoC variants use an empty password because no real
PostgreSQL credential is needed; Zeek parses this into `url.password: ""` natively. The `url.username`
field will surface whatever username the tooling used and is available for triage.

### Possible investigation steps

- Check `http.response.status_code`. A `400` indicates the request reached the vulnerable sidecar
  handler; a `401` indicates access was blocked or the host is patched. A `400` with injection
  content in the body is a high-confidence indicator of active exploitation.
- Identify which injection artifact triggered the rule:
  - `hostaddr=` or `host=` in `database` → server-side database pivot; check for outbound connections
    from the Splunk host to port 5432 or the attacker-supplied `port=` value.
  - `passfile=/opt/splunk/var/packages/data/postgres/.pgpass` → local PostgreSQL credential reuse;
    this exact string is the public restore-chain artifact from watchTowr.
  - `backupFile` with `../` traversal, or `/opt/splunk/etc/apps/` anywhere in the body →
    arbitrary file placement; check for new or modified files at those paths.
  - `dbname=template1` with `passfile=` → the published two-stage restore payload.
- Correlate with host telemetry: new files under `/opt/splunk/etc/apps/`, `/opt/splunk/var/packages/`,
  or `/tmp/` created around the request time.
- Check for outbound PostgreSQL connections from the Splunk host following any `hostaddr=` or `host=`
  injection (see companion rule "Splunk Enterprise PostgreSQL Backup-to-Restore RCE Sequence").
- Verify whether the target Splunk host is running an affected version (10.0.0-10.0.6 or
  10.2.0-10.2.3). Splunk Enterprise 10.4 and Splunk Cloud are not affected.

### False positive analysis

- No legitimate Splunk user workflow sends PostgreSQL connection-string keywords or filesystem paths
  to these recovery endpoints. This rule has very low false positive potential when the path filter
  is in scope.

### Response and remediation

- Any confirmed body injection on the recovery endpoints should be treated as active exploitation.
  Isolate the Splunk host immediately and preserve forensic state.
- Check for files placed by `backupFile` traversal and SQL objects loaded by the restore step.
- Patch Splunk Enterprise to an unaffected version. There is no vendor-provided workaround for
  CVE-2026-20253.
"""
references = [
    "https://nvd.nist.gov/vuln/detail/CVE-2026-20253",
    "https://advisory.splunk.com/advisories/SVD-2026-0603",
    "https://labs.watchtowr.com/why-use-app-level-auth-when-every-database-has-auth-splunk-enterprise-cve-2026-20253-pre-auth-rce/",
    "https://attack.mitre.org/techniques/T1190/",
]
risk_score = 73
rule_id = "2a7823db-0bc2-48f6-aa2f-e6aef233c6dc"
setup = """## Setup

This rule covers two detection paths with different telemetry requirements:

**Body injection branch** (`http.request.body.content`): Populated by:
- Elastic Defend (`logs-endpoint.events.network*`) on the Splunk host, capturing HTTP network
  events at the endpoint level
- WAF products (AWS WAF, ModSecurity, Azure Application Gateway WAF) configured to log request
  bodies — forwarded to `logs-*` via custom ingest pipelines (no standard Elastic integration)
- Reverse proxies (nginx, HAProxy) with explicit request-body capture — same custom path

Avoid enabling broad request-body logging without masking or filtering — bodies can contain
credentials and PII. Scope capture to specific URL paths (e.g., `*/splunkd/*`) where possible.

**Auth artifact branch** (`url.password`, `url.username`): Populated by:
- Zeek (`logs-zeek.http*`) - parses HTTP Basic auth headers natively, no additional configuration
- Corelight (`logs-corelight.*`) - same parsing capability via its Zeek-based HTTP analyzer

Use the companion rules "Splunk Enterprise PostgreSQL Recovery Endpoint Access" and
"Splunk Enterprise PostgreSQL Backup-to-Restore RCE Sequence" for detections that work without
either body capture or auth header logging.
"""
severity = "high"
tags = [
    "Domain: Network",
    "Use Case: Threat Detection",
    "Use Case: Vulnerability",
    "Use Case: Network Security Monitoring",
    "Tactic: Initial Access",
    "Data Source: Elastic Defend",
    "Data Source: Corelight",
    "Data Source: Zeek",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
http.request.method : "POST"
  and url.path : "*splunkd/__raw/v1/postgres/recovery/*"
  and (
    (
      http.request.body.content : "*\"database\"*hostaddr=*"
      or http.request.body.content : "*\"database\"*host=*"
      or http.request.body.content : "*\"database\"*passfile=*"
      or http.request.body.content : "*\"database\"*dbname=template1*"
      or http.request.body.content : "*\"backupFile\"*../*"
      or http.request.body.content : "*/opt/splunk/var/packages/data/postgres/.pgpass*"
      or http.request.body.content : "*/opt/splunk/etc/apps/*"
    )
    or
    (
      data_stream.dataset : ("zeek.http" or "corelight.http")
      and url.password : ""
    )
  )
'''


