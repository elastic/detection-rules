[metadata]
creation_date = "2026/06/21"
integration = ["o365"]
maturity = "production"
updated_date = "2026/06/21"

[rule]
author = ["Elastic"]
description = """
Identifies a cross-tenant Microsoft Teams call involving a user from a foreign tenant whose display name or email
local-part resembles IT help desk staff. Adversaries frequently follow an initial Teams chat with voice or video calls
to pressure victims into granting remote access.
"""
false_positives = [
    """
    Legitimate external support vendors may place cross-tenant Teams calls using help desk-style display names. Validate
    the sender tenant, domain, and business relationship before closing as benign.
    """,
]
from = "now-9m"
index = ["logs-o365.audit-*", "filebeat-*"]
language = "kuery"
license = "Elastic License v2"
name = "M365 Teams Rogue Help Desk Call"
note = """## Triage and analysis

### Investigating M365 Teams Rogue Help Desk Call

Cross-tenant help desk impersonation campaigns often progress from `ChatCreated` to `MessageSent` and then one or more
`CallParticipantDetail` events. Review `o365.audit.CallId`, `o365.audit.JoinTime`, `o365.audit.LeaveTime`, and
`o365.audit.Attendees` to reconstruct call duration and participants.

#### Possible investigation steps

- Pivot on `o365.audit.CallId` and `o365.audit.ChatThreadId` for related chat and message activity.
- Review `o365.audit.Attendees.RecipientType` — victim-side records often show `GuestFederated` while the external
  organizer appears as `InternalFederated`.
- Inspect `source.ip`, `client.ip`, and `o365.audit.DeviceInformation` for the external caller.
- Determine whether the targeted user accepted the call and whether endpoint telemetry shows remote support tooling
  during or after the call window.

### False positive analysis

- Approved managed service providers may initiate cross-tenant support calls. Anchor exceptions on trusted external
  tenant IDs or sender domains.

### Response and remediation

- Warn affected users and confirm whether remote access was granted during the call.
- Block or restrict malicious external tenants via Teams federation policy.
- Hunt for additional calls from the same `user.email` or `user.domain` across the organization."""

references = [
    "https://www.microsoft.com/en-us/security/blog/2026/04/18/crosstenant-helpdesk-impersonation-data-exfiltration-human-operated-intrusion-playbook/",
    "https://techcommunity.microsoft.com/blog/microsoftsecurityexperts/phish-click-breach-hunting-for-a-sophisticated-cyber-attack/4267916",
]
risk_score = 73
rule_id = "b82a223a-0d5d-4ffa-a471-79a63d6b0bb6"
severity = "high"
tags = [
    "Domain: Cloud",
    "Domain: SaaS",
    "Data Source: Microsoft 365",
    "Data Source: Microsoft 365 Audit Logs",
    "Use Case: Threat Detection",
    "Tactic: Initial Access",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
event.dataset:"o365.audit" and event.action:"CallParticipantDetail" and event.provider:"MicrosoftTeams" and
  event.outcome:"success" and
  (
    (o365.audit.Attendees.IsOrganizer:true and o365.audit.Attendees.RecipientType:"InternalFederated") or
    o365.audit.Attendees.RecipientType:"GuestFederated"
  ) and
  (
    o365.audit.Attendees.DisplayName:(
      "Help Desk" or "Help Desk Team" or "Help Desk IT" or "IT Help Desk" or "IT HelpDesk" or
      "Microsoft Security" or "Microsoft  Security" or "Microsoft Support" or
      *Help*Desk* or *IT*Support* or *Technical*Support*
    ) or
    user.email:(
      *helpdesk* or *help.desk* or *help-desk* or *help_desk* or
      *ithelp* or *it.help* or *itsupport* or *it.support* or *it-support*
    ) or
    user.name:(helpdesk or *helpdesk* or *help-desk* or *ithelp* or *itsupport*)
  )
'''

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "user.name",
    "user.email",
    "user.domain",
    "o365.audit.CallId",
    "o365.audit.ChatThreadId",
    "o365.audit.JoinTime",
    "o365.audit.LeaveTime",
    "o365.audit.Attendees",
    "o365.audit.Attendees.DisplayName",
    "o365.audit.Attendees.RecipientType",
    "o365.audit.Attendees.IsOrganizer",
    "o365.audit.DeviceInformation",
    "source.ip",
    "client.ip",
    "event.action",
]

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1566"
name = "Phishing"
reference = "https://attack.mitre.org/techniques/T1566/"

[[rule.threat.technique.subtechnique]]
id = "T1566.003"
name = "Spearphishing via Service"
reference = "https://attack.mitre.org/techniques/T1566/003/"

[rule.threat.tactic]
id = "TA0001"
name = "Initial Access"
reference = "https://attack.mitre.org/tactics/TA0001/"
