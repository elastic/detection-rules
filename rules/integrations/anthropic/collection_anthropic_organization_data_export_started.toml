[metadata]
creation_date = "2026/06/10"
integration = ["anthropic"]
maturity = "production"
updated_date = "2026/06/10"

[rule]
author = ["Elastic"]
description = """
After gaining admin access, an adversary can start an organization data export to pull chats, projects, user metadata,
and configuration into a single downloadable archive. This avoids scraping individual sessions and lets the attacker
harvest intellectual property, credentials, and sensitive prompts at scale before defenders can correlate scattered API
activity. Exports are commonly paired with logging tampering and may precede tenant deletion to remove evidence.
"""
false_positives = [
    """
    Compliance, legal, and platform teams start organization data exports for audits, migrations, litigation holds, or
    offboarding. Validate the actor and business justification before escalating.
    """,
]
from = "now-9m"
index = ["logs-anthropic.audit-*"]
language = "kuery"
license = "Elastic License v2"
name = "Anthropic Organization Data Export Started"
note = """## Triage and analysis

### Investigating Anthropic Organization Data Export Started

Exports can take time to prepare. The start event is often followed by access or completion events for the same job.

#### Possible investigation steps

- Review `anthropic.audit.actor.type` and `organization.id`.
- When the actor is a `user_actor`, review `user.email`, `user.id`, `source.ip`, and `user_agent.original`.
- Search for `org_data_export_accessed` or `org_data_export_completed` events for the same organization.
- Correlate with recent admin role grants, admin API key creation, or authentication changes.
- Confirm the export aligns with an approved audit, migration, or offboarding request.

### False positive analysis

- Exports during contract termination or regulatory review are expected in some environments.

### Response and remediation

- If unauthorized, revoke administrative access for the actor and determine whether exported data left the organization.

## Setup

The Anthropic Fleet integration, or similarly structured data from the Anthropic compliance activities API, is
required to be compatible with this rule."""
references = [
    "https://attack.mitre.org/techniques/T1530/",
    "https://www.elastic.co/security-labs/elastic-advances-llm-security",
    "https://platform.claude.com/docs/en/api/compliance/activities/list",
]
risk_score = 73
rule_id = "a304c107-e0f0-4042-aa6c-5332ce6ca967"
severity = "high"
tags = [
    "Domain: Cloud",
    "Domain: LLM",
    "Data Source: Anthropic",
    "Use Case: Threat Detection",
    "Resources: Investigation Guide",
    "Tactic: Collection",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
data_stream.dataset: "anthropic.audit" and
    event.category: "file" and
    event.action: "org_data_export_started"
'''

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1530"
name = "Data from Cloud Storage"
reference = "https://attack.mitre.org/techniques/T1530/"

[rule.threat.tactic]
id = "TA0009"
name = "Collection"
reference = "https://attack.mitre.org/tactics/TA0009/"

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "event.action",
    "event.id",
    "organization.id",
    "anthropic.audit.actor.type",
]
