[metadata]
creation_date = "2026/06/09"
integration = ["anthropic"]
maturity = "production"
updated_date = "2026/06/09"

[rule]
author = ["Elastic"]
description = """
Single sign-on connections in Anthropic route users through an identity provider for authentication. Deactivating an
SSO connection can force users onto alternate sign-in methods and weaken centralized authentication controls. An
adversary may deactivate SSO while maintaining access through another account or method.
"""
false_positives = [
    """
    Administrators deactivate SSO connections during identity provider migrations, certificate rotation, or
    maintenance. Validate the actor, `anthropic.audit.connection_id`, and whether SSO was restored after the change.
    """,
]
from = "now-9m"
index = ["logs-anthropic.audit-*"]
language = "kuery"
license = "Elastic License v2"
name = "Anthropic SSO Connection Deactivated"
note = """## Triage and analysis

### Investigating Anthropic SSO Connection Deactivated

SSO changes affect how every user in the organization authenticates to Claude. Unexpected deactivation should be
reviewed alongside other identity changes in the same period.

#### Possible investigation steps

- Review `user.email`, `anthropic.audit.actor.type`, `anthropic.audit.connection_id`, and `source.ip`.
- Search for related events such as admin role grants, invite link changes, or magic link setting updates.
- Confirm with the identity team that an IdP migration or maintenance window was scheduled.

### False positive analysis

- Planned IdP work often includes temporarily deactivating a connection. Match the event to the maintenance ticket.

### Response and remediation

- If unauthorized, reactivate SSO and review accounts that signed in while SSO was disabled.

## Setup

The Anthropic Fleet integration, or similarly structured data from the Anthropic compliance activities API, is
required to be compatible with this rule."""
references = [
    "https://platform.claude.com/docs/en/api/compliance/activities/list",
    "https://www.elastic.co/docs/reference/integrations/anthropic",
]
risk_score = 47
rule_id = "8b1072e0-52ea-420f-8e25-92b1c5d76d2a"
severity = "medium"
tags = [
    "Domain: Cloud",
    "Domain: LLM",
    "Data Source: Anthropic",
    "Use Case: Identity and Access Audit",
    "Tactic: Defense Evasion",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
data_stream.dataset: "anthropic.audit" and
    event.action: "org_sso_connection_deactivated"
'''

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1556"
name = "Modify Authentication Process"
reference = "https://attack.mitre.org/techniques/T1556/"

[rule.threat.tactic]
id = "TA0005"
name = "Defense Evasion"
reference = "https://attack.mitre.org/tactics/TA0005/"

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "event.action",
    "event.id",
    "organization.id",
    "user.email",
    "user.id",
    "anthropic.audit.connection_id",
    "source.ip",
    "user_agent.original",
    "anthropic.audit.actor.type",
]
