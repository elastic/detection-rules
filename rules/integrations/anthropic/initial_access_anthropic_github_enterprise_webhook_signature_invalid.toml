[metadata]
creation_date = "2026/06/10"
integration = ["anthropic"]
maturity = "production"
updated_date = "2026/06/10"

[rule]
author = ["Elastic"]
description = """
Anthropic Claude GitHub Enterprise integrations accept repository events only when webhook signatures validate against
a shared secret. Failed signature checks may indicate an adversary probing the endpoint with forged payloads to inject
malicious repository activity into Claude Code Security workflows, test for secret misconfiguration after a partial
compromise, or disrupt the integration during a supply chain attack against connected repositories.
"""
false_positives = [
    """
    GitHub Enterprise configuration changes, secret rotation, or TLS inspection proxies can cause signature validation
    failures during maintenance. Review recent webhook secret updates and infrastructure changes.
    """,
]
from = "now-9m"
index = ["logs-anthropic.audit-*"]
language = "kuery"
license = "Elastic License v2"
name = "Anthropic GitHub Enterprise Webhook Signature Invalid"
note = """## Triage and analysis

### Investigating Anthropic GitHub Enterprise Webhook Signature Invalid

Invalid webhook signatures mean Anthropic rejected a GitHub Enterprise delivery for the configured integration. This
may indicate secret mismatch during maintenance, but repeated failures or activity near integration changes can also
signal supply chain tampering attempts.

#### Possible investigation steps

- Review `anthropic.audit.ghe_configuration_id`, `source.ip`, and `organization.id`.
- Search for recent `ghe_configuration_created`, `ghe_configuration_updated`, or
  `claude_code_security_webhook_secret_updated` events for the same configuration.
- Confirm with the GitHub Enterprise administrator whether secrets or endpoints changed.
- Review GitHub audit logs for unexpected webhook or repository configuration changes.

### False positive analysis

- Signature failures during secret rotation are common if both sides were not updated at the same time.

### Response and remediation

- Rotate webhook secrets if compromise is suspected and verify only trusted repositories remain connected.

## Setup

The Anthropic Fleet integration, or similarly structured data from the Anthropic compliance activities API, is
required to be compatible with this rule."""
references = [
    "https://attack.mitre.org/techniques/T1195/",
    "https://docs.github.com/en/webhooks/using-webhooks/validating-webhook-deliveries",
    "https://www.elastic.co/security-labs/elastic-advances-llm-security",
    "https://platform.claude.com/docs/en/api/compliance/activities/list",
]
risk_score = 73
rule_id = "14290b38-a8dd-474d-bfd7-cce282f4f745"
severity = "high"
tags = [
    "Domain: Cloud",
    "Domain: LLM",
    "Data Source: Anthropic",
    "Use Case: Threat Detection",
    "Resources: Investigation Guide",
    "Tactic: Initial Access",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
data_stream.dataset: "anthropic.audit" and
    event.category: "configuration" and
    event.action: "ghe_webhook_signature_invalid"
'''

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1195"
name = "Supply Chain Compromise"
reference = "https://attack.mitre.org/techniques/T1195/"

[rule.threat.tactic]
id = "TA0001"
name = "Initial Access"
reference = "https://attack.mitre.org/tactics/TA0001/"

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "event.action",
    "event.id",
    "organization.id",
    "anthropic.audit.ghe_configuration_id",
    "user.email",
    "user.id",
    "source.ip",
    "user_agent.original",
    "anthropic.audit.actor.type",
]
