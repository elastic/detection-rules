[metadata]
creation_date = "2026/06/09"
integration = ["anthropic"]
maturity = "production"
updated_date = "2026/06/09"

[rule]
author = ["Elastic"]
description = """
Assigning the admin role to a user in Anthropic Claude for Enterprise grants access to organization settings,
integrations, membership, and security controls. An adversary may grant admin privileges to an existing account or a
newly invited user to maintain persistence and carry out further changes across the tenant.
"""
false_positives = [
    """
    IT administrators assign admin roles during onboarding, staffing changes, or incident response. Verify that the
    target user should hold admin privileges and that a change request exists when required by policy.
    """,
]
from = "now-9m"
index = ["logs-anthropic.audit-*"]
language = "kuery"
license = "Elastic License v2"
name = "Anthropic Admin Role Assigned to User"
note = """## Triage and analysis

### Investigating Anthropic Admin Role Assigned to User

Workspace admin roles in Anthropic control who can change SSO, API keys, exports, and integrations for the organization.
Unexpected assignments may indicate account compromise or an insider abusing elevated access.

This rule identifies when the admin role is granted through a `role_assignment_granted` event.

#### Possible investigation steps

- Identify the actor and target using `user.email`, `user.id`, `user.target.id`, and `user.target.roles`.
- Review `anthropic.audit.resource_type`, `anthropic.audit.resource_id`, and `anthropic.audit.actor.type`.
- Determine whether the target user was recently invited or had other role changes in the same window.
- Search for related activity from the same actor, such as admin API key creation, exports, or SSO changes.
- Review the last 48 hours of audit events for the target user after the role assignment.

### False positive analysis

- Confirm with the administrator who performed the assignment that the change was intentional.
- Verify the target user is expected to have admin access for their job function.

### Response and remediation

- If the assignment was unauthorized, revoke the role, rotate credentials, and review other configuration changes
  made by the same actor.
- Audit recent admin API keys and integration changes for the organization.

## Setup

The Anthropic Fleet integration, or similarly structured data from the Anthropic compliance activities API, is
required to be compatible with this rule."""
references = [
    "https://platform.claude.com/docs/en/api/compliance/activities/list",
    "https://www.elastic.co/docs/reference/integrations/anthropic",
]
risk_score = 73
rule_id = "98355c7c-53d2-498f-81df-2a94069bfc75"
severity = "high"
tags = [
    "Domain: Cloud",
    "Domain: LLM",
    "Data Source: Anthropic",
    "Use Case: Identity and Access Audit",
    "Tactic: Persistence",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
data_stream.dataset: "anthropic.audit" and
    event.action: "role_assignment_granted" and
    user.target.roles: "admin"
'''

