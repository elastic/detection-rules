[metadata]
creation_date = "2026/06/10"
integration = ["anthropic"]
maturity = "production"
updated_date = "2026/06/16"

[rule]
author = ["Elastic"]
description = """
SSO routes Anthropic authentication through the corporate identity provider. An adversary who disables SSO, deactivates,
or deletes an SSO connection can shift users to alternate sign-in paths where IdP-enforced MFA, conditional access, and
session policies no longer apply. Toggling SSO off, deactivating a connection, or deleting it all weaken corporate
identity enforcement and help an attacker sign in with password or magic-link accounts they control while IdP-driven
account lockout cannot reach the tenant.
"""
false_positives = [
    """
    Identity provider directory sync and SCIM provisioning can deactivate or delete SSO connections during IdP
    migrations, directory attribute changes, or connector maintenance. When `anthropic.audit.actor.type` is
    `scim_directory_sync_actor`, correlate with WorkOS or Okta change windows before escalating.
    """,
    """
    Administrators deactivate or delete SSO connections during identity provider migrations, certificate rotation, or
    maintenance. Validate the actor, `anthropic.audit.connection_id`, and whether SSO was restored after the change.
    """,
]
from = "now-9m"
index = ["logs-anthropic.audit-*"]
language = "kuery"
license = "Elastic License v2"
name = "Anthropic SSO Disabled or Connection Removed"
note = """## Triage and analysis

### Investigating Anthropic SSO Disabled or Connection Removed

SSO changes affect how every user in the organization authenticates to Claude. Unexpected toggles off, deactivation, or
deletion should be reviewed alongside other identity changes in the same period. Connection deletion is more severe
because the IdP binding must be re-established rather than re-enabled.

Many organizations receive these events from `scim_directory_sync_actor` during routine IdP directory sync rather than
from an interactive administrator session.

#### Possible investigation steps

- Review `event.action`, `anthropic.audit.actor.type`, `anthropic.audit.connection_id`, `anthropic.audit.enabled`,
  and `organization.id`. This rule matches three paths:
  - `org_sso_toggled` with `anthropic.audit.enabled: false` — SSO turned off org-wide.
  - `org_sso_connection_deactivated` — a specific IdP connection was deactivated.
  - `org_sso_connection_deleted` — a specific IdP connection was removed.
- When the actor is `scim_directory_sync_actor`, review `anthropic.audit.actor.directory_id`,
  `anthropic.audit.actor.workos_event_id`, and `anthropic.audit.actor.idp_connection_type`, then confirm with the IdP
  team whether directory sync or connector maintenance caused the change.
- When the actor is a `user_actor`, review `user.email`, `user.id`, `source.ip`, and `user_agent.original`.
- Search for related events such as admin role grants, magic link second factor changes, or invite link changes.
- Confirm with the identity team that an IdP migration or maintenance window was scheduled.

### False positive analysis

- Planned IdP work often includes temporarily deactivating or removing a connection before a replacement is configured.

### Response and remediation

- If unauthorized, restore or reconfigure SSO and review accounts that signed in while SSO was unavailable.

## Setup

The Anthropic Fleet integration, or similarly structured data from the Anthropic compliance activities API, is
required to be compatible with this rule."""
references = [
    "https://attack.mitre.org/techniques/T1556/",
    "https://platform.claude.com/docs/en/api/compliance/activities/list",
]
risk_score = 73
rule_id = "b0b81938-a2d3-4222-977b-56f9c81afcf7"
severity = "high"
tags = [
    "Domain: Cloud",
    "Domain: LLM",
    "Data Source: Anthropic",
    "Use Case: Identity and Access Audit",
    "Use Case: Threat Detection",
    "Resources: Investigation Guide",
    "Tactic: Defense Evasion",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
data_stream.dataset: "anthropic.audit" and
    event.category: "iam" and (
        event.action: ("org_sso_connection_deactivated" or "org_sso_connection_deleted") or
        (event.action: "org_sso_toggled" and anthropic.audit.enabled: false)
    )
'''


[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id = "T1556"
name = "Modify Authentication Process"
reference = "https://attack.mitre.org/techniques/T1556/"


[rule.threat.tactic]
id = "TA0005"
name = "Defense Evasion"
reference = "https://attack.mitre.org/tactics/TA0005/"

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "event.action",
    "event.id",
    "organization.id",
    "anthropic.audit.connection_id",
    "anthropic.audit.enabled",
    "anthropic.audit.actor.type",
    "anthropic.audit.actor.directory_id",
    "anthropic.audit.actor.workos_event_id",
    "anthropic.audit.actor.idp_connection_type",
    "user.email",
    "user.id",
    "source.ip",
    "user_agent.original",
]

