[metadata]
creation_date = "2026/04/04"
integration = ["aws"]
maturity = "production"
updated_date = "2026/04/04"

[rule]
author = ["Elastic"]
description = """
Identifies the first time a principal successfully reads EC2 instance user data via DescribeInstanceAttribute in a client
context that excludes common automation and CSPM patterns. Offensive tooling such as Pacu's ec2__download_userdata module
enumerates instances and calls DescribeInstanceAttribute for the userData attribute to recover scripts or secrets baked
into launch configuration. This rule narrows noise relative to generic user-data reads by requiring a populated client
source IP, excluding Terraform- and CrowdStrike CSPM-related identities and user agents, and suppressing select AWS
service invoked_by values while still applying a new-terms baseline on the principal and target instance.
"""
false_positives = [
    """
    First legitimate use of DescribeInstanceAttribute (userData) for a given principal and instance within the history
    window. Custom automation, internal security tools, or consoles from new networks may match until baselined. Tune on
    `aws.cloudtrail.user_identity.arn`, `user_agent.original`, or corporate IP ranges. User agents that contain
    "terraform" with different casing may require an additional exception.
    """,
]
from = "now-6m"
index = ["filebeat-*", "logs-aws.cloudtrail-*"]
language = "kuery"
license = "Elastic License v2"
name = "AWS EC2 User Data Read by New Principal in Unusual Client Context"
note = """## Triage and analysis

### Investigating AWS EC2 User Data Read by New Principal in Unusual Client Context

`DescribeInstanceAttribute` with `attribute=userData` returns base64 user data that may include bootstrap scripts,
embedded credentials, or environment hints. Attack frameworks such as [Pacu ec2__download_userdata](https://github.com/RhinoSecurityLabs/pacu/blob/master/pacu/modules/ec2__download_userdata/main.py) automate this across instances.

This **new terms** rule fires on the **first observation** (within the configured history window) of the combination of
`user.name`, target `instanceId`, and `cloud.account.id` for events that also pass the contextual filters (client
`source.ip` present, not Terraform/CrowdStrike CSPM-style identities, excluded `invoked_by` service labels).

#### Possible investigation steps

- Map `aws.cloudtrail.flattened.request_parameters.instanceId` to the workload owner, sensitivity, and whether user data
  may hold secrets.
- Compare `user.name` / `aws.cloudtrail.user_identity.arn` to change records and IAM least-privilege expectations.
- Review `user_agent.original` and `source.ip` for tooling consistent with Pacu, boto3, or unexpected geolocation.
- Hunt for adjacent EC2 enumeration (`DescribeInstances`), IAM activity, or credential use from the same access key.

### False positive analysis

- New engineers or playbooks touching user data for debugging.
- Missing `source.ip` enrichment in some pipelines would **suppress** matches by design; if you rely on internal-only
  logging without IP, consider a separate rule variant.

### Response and remediation

- If unauthorized: revoke `ec2:DescribeInstanceAttribute` where not required, rotate any secrets referenced in user data,
  and review instance role permissions.
- [DescribeInstanceAttribute](https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_DescribeInstanceAttribute.html)

### Additional information

- [Pacu: ec2__download_userdata](https://github.com/RhinoSecurityLabs/pacu/blob/master/pacu/modules/ec2__download_userdata/main.py)
"""
references = [
    "https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_DescribeInstanceAttribute.html",
    "https://github.com/RhinoSecurityLabs/pacu/blob/master/pacu/modules/ec2__download_userdata/main.py",
    "https://hackingthe.cloud/aws/exploitation/local_ec2_priv_esc_through_user_data",
]
risk_score = 47
rule_id = "a3f91bc2-8d4e-4f2a-9c1b-7e6d5c4b3a21"
severity = "medium"
tags = [
    "Domain: Cloud",
    "Data Source: AWS",
    "Data Source: Amazon Web Services",
    "Data Source: Amazon EC2",
    "Use Case: Threat Detection",
    "Tactic: Discovery",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "new_terms"

query = '''
event.dataset: "aws.cloudtrail"
    and event.provider: "ec2.amazonaws.com"
    and event.action: "DescribeInstanceAttribute"
    and event.outcome: "success"
    and (
        aws.cloudtrail.flattened.request_parameters.attribute: "userData"
        or aws.cloudtrail.request_parameters: *attribute=userData*
    )
    and source.ip: *
    and not aws.cloudtrail.user_identity.arn: (*terraform* or *CrowdStrikeCSPMReader*)
    and not aws.cloudtrail.user_identity.invoked_by: (
        "aiops.amazonaws.com" or
        "AWS Internal" or
        "aidevops.amazonaws.com"
    )
    and not user_agent.original: *Terraform*
'''

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "user.name",
    "user_agent.original",
    "source.ip",
    "aws.cloudtrail.user_identity.arn",
    "aws.cloudtrail.user_identity.type",
    "aws.cloudtrail.user_identity.access_key_id",
    "aws.cloudtrail.user_identity.invoked_by",
    "aws.cloudtrail.flattened.request_parameters.instanceId",
    "aws.cloudtrail.flattened.request_parameters.attribute",
    "event.action",
    "event.outcome",
    "cloud.account.id",
    "cloud.region",
    "aws.cloudtrail.request_parameters",
]

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1580"
name = "Cloud Infrastructure Discovery"
reference = "https://attack.mitre.org/techniques/T1580/"

[rule.threat.tactic]
id = "TA0007"
name = "Discovery"
reference = "https://attack.mitre.org/tactics/TA0007/"

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1552"
name = "Unsecured Credentials"
reference = "https://attack.mitre.org/techniques/T1552/"

[[rule.threat.technique.subtechnique]]
id = "T1552.005"
name = "Cloud Instance Metadata API"
reference = "https://attack.mitre.org/techniques/T1552/005/"

[rule.threat.tactic]
id = "TA0006"
name = "Credential Access"
reference = "https://attack.mitre.org/tactics/TA0006/"

[rule.new_terms]
field = "new_terms_fields"
value = ["user.name", "aws.cloudtrail.flattened.request_parameters.instanceId", "cloud.account.id"]
[[rule.new_terms.history_window_start]]
field = "history_window_start"
value = "now-10d"
