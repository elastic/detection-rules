[metadata]
creation_date = "2026/04/03"
integration = ["aws"]
maturity = "production"
updated_date = "2026/04/03"

[rule]
author = ["Elastic"]
description = """
Identifies successful AWS API requests recorded in CloudTrail where the HTTP user agent indicates TruffleHog, a tool
commonly used to discover exposed secrets and credentials across code and cloud surfaces. Such activity may reflect
authorized security scanning, but in production accounts it can also indicate credential testing or post-compromise
enumeration using valid cloud access.
"""
false_positives = [
    """
    Approved secret scanning, purple-team exercises, or pipeline jobs that run TruffleHog against AWS APIs may trigger
    this rule. Exclude expected principals (`aws.cloudtrail.user_identity.arn`), source networks, or automation service
    accounts after validation.
    """,
]
from = "now-6m"
index = ["filebeat-*", "logs-aws.cloudtrail-*"]
interval = "5m"
language = "kuery"
license = "Elastic License v2"
name = "AWS CloudTrail API Request with TruffleHog User Agent"
note = """## Triage and analysis

### Investigating AWS CloudTrail API Request with TruffleHog User Agent

CloudTrail records `user_agent.original` for API callers. TruffleHog (and some wrappers) may identify the client in that string when interacting with AWS endpoints.

#### Possible investigation steps

- Review `aws.cloudtrail.user_identity.arn`, `aws.cloudtrail.user_identity.access_key_id`, and `event.action` to see which APIs were invoked and whether the principal should run secret-scanning tooling.
- Compare `source.ip`, `source.geo.*`, and `source.as.organization.name` to your approved scanning sources.
- Correlate with endpoint telemetry using the rule **Credential Access via TruffleHog Execution** (filesystem scanning) and with other CloudTrail events from the same identity in the same window.

### False positive analysis

- Internal AppSec, audit, or CSPM pipelines that intentionally use TruffleHog against AWS should be allowlisted.

### Response and remediation

- If unauthorized, revoke the active keys or session, review IAM permissions for excessive `s3:GetObject`, secrets managers, or repo access, and rotate any secrets that could have been exposed.

### Additional information

- [CloudTrail userIdentity element](https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-event-reference-user-identity.html)
"""
references = [
    "https://github.com/trufflesecurity/trufflehog",
    "https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-event-reference-user-identity.html",
]
risk_score = 47
rule_id = "7e91c4b2-8a3f-4d6e-b1c0-2d9f8e7a6b5c"
severity = "medium"
tags = [
    "Domain: Cloud",
    "Data Source: AWS",
    "Data Source: Amazon Web Services",
    "Data Source: AWS CloudTrail",
    "Tactic: Initial Access",
    "Tactic: Credential Access",
    "Use Case: Cloud Threat Detection",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
event.dataset: "aws.cloudtrail"
    and event.outcome: "success"
    and (user_agent.original: *TruffleHog* or user_agent.original: *trufflehog*)
'''

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "user.name",
    "user_agent.original",
    "source.ip",
    "aws.cloudtrail.user_identity.arn",
    "aws.cloudtrail.user_identity.type",
    "aws.cloudtrail.user_identity.access_key_id",
    "event.provider",
    "event.action",
    "event.outcome",
    "cloud.account.id",
    "cloud.region",
]

