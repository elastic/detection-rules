[metadata]
creation_date = "2026/06/29"
integration = ["aws"]
maturity = "production"
updated_date = "2026/06/29"

[rule]
author = ["Elastic"]
description = """
Identifies the first time an IAM principal generates a presigned URL for an Amazon SageMaker notebook instance or Studio
domain via CreatePresignedNotebookInstanceUrl or CreatePresignedDomainUrl. A presigned URL grants interactive browser
access to a Jupyter or Studio environment that executes code with the notebook or user profile's IAM execution role. An
adversary with compromised credentials can use this to obtain an interactive shell running a privileged role, bypassing
the need for instance SSH access. Because regular users access their own environments through a small, stable set of
identities, a presigned URL generated by a principal not seen doing so before is a meaningful signal.
"""
false_positives = [
    """
    Data scientists and engineers legitimately open their notebooks and Studio environments, and new team members or
    automation will appear as new principals the first time they do so. Verify the principal in
    "aws.cloudtrail.user_identity.arn", the target environment in "aws.cloudtrail.request_parameters", and whether the
    access aligns with expected usage. Known users can be excluded after validation.
    """,
]
from = "now-9m"
index = ["logs-aws.cloudtrail-*"]
language = "kuery"
license = "Elastic License v2"
name = "AWS SageMaker Presigned URL Generated by Unusual Principal"
note = """## Triage and analysis

### Investigating AWS SageMaker Presigned URL Generated by Unusual Principal

"CreatePresignedNotebookInstanceUrl" and "CreatePresignedDomainUrl" return a browser URL that opens an interactive Jupyter or Studio session. Code run in that session executes with the notebook instance's or user profile's IAM execution role, which is often broadly privileged. An adversary holding stolen credentials can generate such a URL to gain interactive, role-backed code execution without any SSH or instance access. A presigned URL produced by a principal not seen doing so within the history window is a strong access signal.

### Possible investigation steps

- Identify the principal in "aws.cloudtrail.user_identity.arn" and "aws.cloudtrail.user_identity.type", and review "source.ip", "source.as.organization.name", and "user_agent.original" for an unexpected origin.
- Identify the target notebook instance or Studio domain/user profile in "aws.cloudtrail.request_parameters" and the execution role it runs.
- Determine whether the principal normally accesses this environment and whether the access aligns with expected work.
- Correlate with adjacent activity, such as use of the execution role's credentials outside SageMaker, lifecycle configuration changes, or GPU resource creation.

### False positive analysis

- Legitimate interactive access generates these events routinely; new users and automation appear as new principals on first access. Confirm the access is expected and exclude known users on "aws.cloudtrail.user_identity.arn" after validation.

### Response and remediation

- If unauthorized, stop the affected notebook instance or disable the Studio user profile, and rotate the execution role's credentials.
- Review actions taken by the execution role during the session, and restrict "sagemaker:CreatePresignedNotebookInstanceUrl" and "sagemaker:CreatePresignedDomainUrl" to approved identities.
"""
references = [
    "https://docs.aws.amazon.com/sagemaker/latest/APIReference/API_CreatePresignedNotebookInstanceUrl.html",
    "https://docs.aws.amazon.com/sagemaker/latest/APIReference/API_CreatePresignedDomainUrl.html",
]
risk_score = 47
rule_id = "7ac38edc-e0c5-44bb-ac0a-5db19db048a4"
setup = "This rule requires AWS CloudTrail logs ingested via the Elastic AWS integration. See https://docs.elastic.co/integrations/aws/cloudtrail for setup details."
severity = "medium"
tags = [
    "Domain: Cloud",
    "Domain: Identity",
    "Data Source: AWS",
    "Data Source: Amazon Web Services",
    "Data Source: AWS SageMaker",
    "Use Case: Identity and Access Audit",
    "Tactic: Initial Access",
    "Tactic: Lateral Movement",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "new_terms"

query = '''
data_stream.dataset: "aws.cloudtrail"
    and event.provider: "sagemaker.amazonaws.com"
    and event.action: ("CreatePresignedNotebookInstanceUrl" or "CreatePresignedDomainUrl")
    and event.outcome: "success"
    and not aws.cloudtrail.user_identity.type: "AWSService"
'''


[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id = "T1078"
name = "Valid Accounts"
reference = "https://attack.mitre.org/techniques/T1078/"
[[rule.threat.technique.subtechnique]]
id = "T1078.004"
name = "Cloud Accounts"
reference = "https://attack.mitre.org/techniques/T1078/004/"



[rule.threat.tactic]
id = "TA0001"
name = "Initial Access"
reference = "https://attack.mitre.org/tactics/TA0001/"
[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id = "T1550"
name = "Use Alternate Authentication Material"
reference = "https://attack.mitre.org/techniques/T1550/"
[[rule.threat.technique.subtechnique]]
id = "T1550.001"
name = "Application Access Token"
reference = "https://attack.mitre.org/techniques/T1550/001/"



[rule.threat.tactic]
id = "TA0008"
name = "Lateral Movement"
reference = "https://attack.mitre.org/tactics/TA0008/"

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "user.name",
    "user_agent.original",
    "source.ip",
    "source.as.number",
    "source.as.organization.name",
    "aws.cloudtrail.user_identity.arn",
    "aws.cloudtrail.user_identity.type",
    "aws.cloudtrail.user_identity.access_key_id",
    "event.action",
    "event.outcome",
    "cloud.account.id",
    "cloud.region",
    "aws.cloudtrail.request_parameters",
    "aws.cloudtrail.response_elements",
]

[rule.new_terms]
field = "new_terms_fields"
value = ["aws.cloudtrail.user_identity.arn"]
[[rule.new_terms.history_window_start]]
field = "history_window_start"
value = "now-7d"

