[metadata]
creation_date = "2026/04/22"
integration = ["kubernetes"]
maturity = "production"
updated_date = "2026/04/22"

[rule]
author = ["Elastic"]
description = """
After obtaining Kubernetes API credentials, adversaries often reach for generic HTTP stacks and scripting runtimes
(curl, wget, Python requests, Go’s default client, and similar) instead of kubectl or in-cluster controllers that
advertise purpose-built user agents. Those clients are easy to drive from a stolen kubeconfig, a compromised bastion, 
or a reverse shell and are commonly used to enumerate or download Secret objects (tokens, registry credentials, TLS
material, application keys).
"""
false_positives = [
    """
    Administrators and SREs sometimes use curl or Python from a workstation or jump host to debug Secret content during
    incidents; confirm identity, IP, and change records before escalating.
    """,
    """
    Custom internal tools built with Go, Java, Node, or Python may legitimately read secrets with matching user-agent
    substrings; baseline known automation and exclude stable service accounts or namespaces.
    """,
]
index = ["logs-kubernetes.audit_logs-*"]
language = "kuery"
license = "Elastic License v2"
name = "Kubernetes Secret get or list via Scripting or Generic HTTP Client"
note = """## Triage and analysis

### Investigating Kubernetes Secret get or list via Scripting or Generic HTTP Client

The rule matches Kubernetes audit events for **secret** `get`/`list` where `user_agent.original` resembles **curl,
wget, Python, Perl, Java, Node, PHP**, or **Go’s default HTTP client**, and **`source.ip` is populated**. Use it to spot
manual or scripted **credential access** that bypasses standard cluster tooling.

### Possible investigation steps

- Tie `user.name` (and `kubernetes.audit.impersonatedUser.*` if present) to a human, service account, or cloud identity
  and validate whether that principal should use this client class against the targeted namespaces and secret names.
- Review `kubernetes.audit.objectRef.namespace` and `kubernetes.audit.objectRef.name` for high-value objects (service
  account tokens, cloud IAM bindings, registry pulls, TLS bundles).
- Pivot on `source.ip` in VPC flow, VPN, or proxy logs to determine origin (employee laptop, compromised host, cloud
  instance) and correlate with other API bursts or exec activity.
- Check `kubernetes.audit.annotations.authorization_k8s_io/decision` for successful reads versus failed probing.

### False positive analysis

- CI runners and GitOps jobs occasionally use curl or generic Go clients with broad RBAC; exclude stable pipelines after
  review.
- Local API server loopback may still populate `source.ip` in some topologies; compare with expected control-plane paths.

### Response and remediation

- If unauthorized, rotate affected secrets and credentials, revoke tokens or kubeconfigs for the identity, tighten RBAC,
  and block or isolate the source host at the network edge to the API server where appropriate.
"""
references = [
    "https://attack.mitre.org/techniques/T1552/007/",
    "https://kubernetes.io/docs/concepts/configuration/secret/",
]
risk_score = 73
rule_id = "a4c8e901-2b7f-4d6e-9a3c-8e1f0d5b6c2a"
severity = "high"
tags = [
    "Data Source: Kubernetes",
    "Domain: Kubernetes",
    "Use Case: Threat Detection",
    "Tactic: Credential Access",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "query"
query = '''
data_stream.dataset:"kubernetes.audit_logs" and
event.action:(get or list) and
kubernetes.audit.objectRef.resource:"secrets" and
user_agent.original:(curl* or python* or wget* or Go-http* or perl* or java* or node* or php*) and
source.ip:*
'''

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1552"
name = "Unsecured Credentials"
reference = "https://attack.mitre.org/techniques/T1552/"

[[rule.threat.technique.subtechnique]]
id = "T1552.007"
name = "Container API"
reference = "https://attack.mitre.org/techniques/T1552/007/"

[rule.threat.tactic]
id = "TA0006"
name = "Credential Access"
reference = "https://attack.mitre.org/tactics/TA0006/"
