[metadata]
creation_date = "2026/05/30"
integration = ["github"]
maturity = "development"
updated_date = "2026/05/30"

[rule]
author = ["Spyced Concepts Ltd."]
description = """
Flags git pushes that create or modify workflow files for manual content review. The Megalodon mass variant
(SysDiag.yml) combines pull_request_target with id-token: write permissions — granting fork pull requests
access to OIDC tokens and repository secrets. This dangerous combination was exploited across 5,561 GitHub
repositories in the May 2026 Megalodon campaign.

The GitHub audit log records the push event but does not expose workflow file contents. This rule flags the
push for triage; content-level detection of the dangerous permission combination requires applying the
companion YARA rule Megalodon_Workflow_Dangerous_Permissions (from megalodon-workflow.yar) to the
.github/workflows/ files in the affected repository.

Intelligence: IoC data sourced from SafeDep.io original Megalodon research (see references).
Detection rule logic is original work by Spyced Concepts Ltd.
"""
false_positives = [
    """
    Legitimate use of pull_request_target exists for read-only cross-fork label and comment workflows.
    These do not require id-token:write. Any workflow combining both should be reviewed against GitHub's
    own guidance on preventing pwn requests (see references) and explicitly documented.
    """,
]
from = "now-9m"
index = ["logs-github.audit-*"]
language = "kuery"
license = "Elastic License v2"
name = "Megalodon - Push to Workflow Directory Requires Content Review for Dangerous Permissions"
note = """## Triage and analysis

### Investigating Megalodon Dangerous Workflow Permissions

This rule flags pushes to the workflow directory. The dangerous permission combination (pull_request_target +
id-token:write) cannot be detected from audit log field values alone — it requires file content inspection.

### Possible investigation steps

- Review the pushed workflow files from the repository's commit history.
- Apply the Megalodon YARA rule Megalodon_Workflow_Dangerous_Permissions to any new or modified .yml/.yaml
  files in .github/workflows/ — a match confirms the dangerous combination.
- Check for the known Megalodon workflow names (SysDiag, Optimize-Build) — if present, escalate immediately.
- Review `github.actor` — was this push from an expected identity?
- If the workflow contains pull_request_target and id-token:write, review GitHub's guidance on pwn requests
  to determine if the combination is legitimate in context.

### False positive analysis

- PR-triggered OIDC deployments (e.g., deploy previews) legitimately combine pull_request_target with
  id-token:write. These should be documented and excluded from alerting once verified.

### Response and remediation

- If YARA confirms the Megalodon dangerous permissions pattern: treat as active compromise.
- Revert the commit and remove the malicious workflow file.
- Rotate all OIDC-accessible secrets and CI credentials.
- Audit any fork PRs that ran against this workflow — OIDC tokens may have been exfiltrated.
"""
references = [
    "https://safedep.io/megalodon-mass-github-repo-backdooring-ci-workflows/",
    "https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/",
    "https://github.com/Spyced-Concepts/detection-rules",
]
risk_score = 47
rule_id = "851b6dbe-360d-4127-9983-64c5257d27c5"
severity = "medium"
tags = [
    "Domain: Cloud",
    "Use Case: Threat Detection",
    "Tactic: Persistence",
    "Tactic: Privilege Escalation",
    "Data Source: Github",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
data_stream.dataset:"github.audit" and
event.action:"git.push" and (
  github.head_commit.added:".github/workflows/*" or
  github.head_commit.modified:".github/workflows/*"
)
'''

