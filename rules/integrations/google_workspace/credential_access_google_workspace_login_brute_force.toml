[metadata]
creation_date = "2026/05/10"
integration = ["google_workspace"]
maturity = "development"
updated_date = "2026/05/10"

[rule]
author = ["Ivan Saakov"]
description = """
Detects when a Google Workspace account experiences an abnormal number of login failures within a short time window,
indicating a potential brute force or credential stuffing attack. This is especially significant for accounts with
administrative privileges, where successful compromise would give an adversary domain-wide control. The threshold
of 10 failures per account per detection window is a starting point; organizations should tune based on their
observed login failure baselines.
"""
false_positives = [
    """
    Users who forget their passwords, have misconfigured email clients, or are using outdated credentials stored
    in multiple applications may generate multiple login failures. Automated service accounts with expiring
    credentials also produce login failure events. Investigate the source IP diversity — a single IP suggests
    user error, while multiple IPs suggest a distributed attack.
    """,
]
from = "now-130m"
index = ["filebeat-*", "logs-google_workspace*"]
interval = "10m"
language = "kuery"
license = "Elastic License v2"
name = "Google Workspace Excessive Login Failures Detected"
note = """## Triage and analysis

### Investigating Google Workspace Excessive Login Failures Detected

Repeated login failures against a Google Workspace account may indicate brute force, password spraying, or
credential stuffing attacks. This is particularly dangerous for admin accounts, where successful compromise
grants broad domain control. Unlike typical cloud brute force, GWS login failures do not always trigger lockout,
making detection critical.

#### Possible investigation steps

- **Identify the targeted account**: Review `user.email` — is this an admin, executive, or service account?
  - High-privilege account targeting requires immediate escalation.
- **Analyze source IPs**: Are failures coming from a single IP (user error) or multiple IPs (coordinated attack)?
  - Check `source.ip` and `source.geo.country_name` for anomalies.
- **Review authentication methods**: What authentication method was attempted? Password only, SAML, OAuth?
  - Check `google_workspace.login.challenge_method` if available.
- **Check for eventual success**: Did any login succeed shortly after the failures?
  - Search for `event.action:login_success` by the same `user.email` within the timeframe.
- **Check for MFA bypass attempts**: Were there 2SV challenge failures?

### False positive analysis

- Misconfigured mail clients with stale passwords generate repeated login failures.
- Service accounts with rotating credentials may fail temporarily during rotation.

### Response and remediation

- If a successful login follows the failures: initiate account takeover investigation immediately.
- Force password reset for the targeted account.
- If admin account: temporarily suspend the account pending investigation.
- Enable login alerts and enforce hardware security keys for admin accounts.
- Block the attacking IP ranges at the perimeter if a clear attack pattern is identified.
"""
references = [
    "https://support.google.com/a/answer/6002699",
    "https://developers.google.com/admin-sdk/reports/reference/rest/v1/activities/list",
]
risk_score = 73
rule_id = "4f56da1f-b11c-4712-af8b-6badf6615a44"
severity = "high"
tags = [
    "Domain: Cloud",
    "Data Source: Google Workspace",
    "Use Case: Identity and Access Audit",
    "Resources: Investigation Guide",
    "Tactic: Credential Access",
]
timestamp_override = "event.ingested"
type = "threshold"

query = '''
data_stream.dataset:"google_workspace.login"
  and event.action:"login_failure"
'''

[rule.threshold]
field = ["user.email"]
value = 10

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1110"
name = "Brute Force"
reference = "https://attack.mitre.org/techniques/T1110/"

[[rule.threat.technique.subtechnique]]
id = "T1110.001"
name = "Password Guessing"
reference = "https://attack.mitre.org/techniques/T1110/001/"

[rule.threat.tactic]
id = "TA0006"
name = "Credential Access"
reference = "https://attack.mitre.org/tactics/TA0006/"
