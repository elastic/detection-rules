[metadata]
creation_date = "2026/05/10"
integration = ["google_workspace"]
maturity = "development"
updated_date = "2026/05/10"

[rule]
author = ["Ivan Saakov"]
description = """
Detects when a Google Workspace administrator changes a user's password. While this is a routine operation for
IT helpdesk staff responding to locked-out users, it is also a technique used by adversaries who have gained admin
access to take over target accounts. Admin-initiated password changes for executives, other admins, or security
personnel — especially outside business hours — should be treated as high-priority events for verification.
"""
false_positives = [
    """
    IT helpdesk teams regularly perform admin-initiated password resets in response to support tickets from
    locked-out users. Automated provisioning and identity governance systems may also reset passwords as part
    of lifecycle management workflows. Validate that the password change corresponds to an open IT support ticket
    or expected provisioning activity.
    """,
]
from = "now-130m"
index = ["filebeat-*", "logs-google_workspace*"]
interval = "10m"
language = "kuery"
license = "Elastic License v2"
name = "Google Workspace User Password Changed by Administrator"
note = """## Triage and analysis

### Investigating Google Workspace User Password Changed by Administrator

An admin-initiated password change for a user account is a privileged operation that immediately grants the admin
(or the person they share the new password with) access to that user's Google account, email, Drive, and all
integrated services. When performed by unauthorized actors, this is a direct account takeover technique.

#### Possible investigation steps

- **Identify the actor**: Review `user.email` — is this an IT helpdesk member or known provisioning system?
  - An admin changing passwords for accounts they don't normally support is suspicious.
- **Identify the target**: Review `user.target.email` — what is this user's role?
  - Password changes on admin accounts, executives, or security team members warrant immediate escalation.
- **Check for a corresponding support ticket**: Was there a help desk request for this password reset?
- **Look for follow-up access**: Did the target account log in shortly after the password change?
  - If yes, from what IP/location?
- **Review the actor's other activity**: Did this admin make other changes (role assignments, forwarding rules) around the same time?

### False positive analysis

- Help desk password resets are common and expected.
- Automated provisioning password resets during account lifecycle events.

### Response and remediation

- If unauthorized: force another password change for the affected account immediately.
- If the target account was accessed with the new password by an unauthorized party: initiate account takeover response.
- Enable login alerts for admin accounts and require 2FA on all admin sessions.
- Consider requiring dual-admin approval for password changes on privileged accounts.
"""
references = [
    "https://support.google.com/a/answer/33319",
    "https://developers.google.com/admin-sdk/reports/reference/rest/v1/activities/list",
]
risk_score = 47
rule_id = "d3ccb094-cbbd-4a7b-977f-9923b97bb22d"
severity = "medium"
tags = [
    "Domain: Cloud",
    "Data Source: Google Workspace",
    "Use Case: Identity and Access Audit",
    "Resources: Investigation Guide",
    "Tactic: Persistence",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
data_stream.dataset:"google_workspace.admin"
  and event.provider:admin
  and event.category:iam
  and event.action:CHANGE_PASSWORD
'''

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "user.email",
    "user.target.email",
    "source.ip",
    "event.action",
]

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1098"
name = "Account Manipulation"
reference = "https://attack.mitre.org/techniques/T1098/"

[rule.threat.tactic]
id = "TA0003"
name = "Persistence"
reference = "https://attack.mitre.org/tactics/TA0003/"

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1531"
name = "Account Access Removal"
reference = "https://attack.mitre.org/techniques/T1531/"

[rule.threat.tactic]
id = "TA0040"
name = "Impact"
reference = "https://attack.mitre.org/tactics/TA0040/"
