[metadata]
creation_date = "2026/03/28"
integration = ["freeipa"]
maturity = "development"
updated_date = "2026/03/28"

[rule]
author = ["Elastic"]
description = """
Identifies a FreeIPA API pwpolicy_mod command that modifies a password policy. Adversaries with admin privileges can
weaken password policies to reduce minimum length, disable lockout, or lower complexity requirements, making brute
force attacks more feasible.
"""
false_positives = [
    """
    Authorized password policy changes during security policy reviews or compliance adjustments may trigger this
    rule. Password policy modifications should be rare and always go through a change management process.
    """,
]
from = "now-9m"
interval = "5m"
language = "esql"
license = "Elastic License v2"
name = "FreeIPA Password Policy Modified"
note = """## Triage and analysis

### Investigating FreeIPA Password Policy Modified

FreeIPA password policies control minimum length, complexity, lockout thresholds, and history. Weakening these policies enables brute force attacks, password reuse, and reduces the effectiveness of lockout-based defenses.

### Possible investigation steps

- Identify the actor from `user.name` and verify they are authorized to modify password policies.
- Review `freeipa.api.parameters` to determine which policy was modified and what settings changed.
- Compare the new policy values against organizational security requirements.
- Determine if the change makes accounts more vulnerable (reduced minlength, lower maxfail, shorter lockouttime).
- Verify the change against a security policy review or change management record.

### Response and remediation

- If unauthorized, restore the password policy to its previous values.
- Investigate the actor's account for compromise.
- Force password resets for any accounts that may have been set with weak passwords during the policy gap.
"""
references = [
    "https://attack.mitre.org/techniques/T1484/",
]
risk_score = 47
rule_id = "1777f05d-6ef7-4cc6-856f-a684418e3faf"
setup = """## Setup

This rule requires the FreeIPA integration to be installed and configured to collect logs from FreeIPA servers.

### FreeIPA Integration Setup
1. Install the FreeIPA integration in Kibana Fleet.
2. Add the integration to an Elastic Agent policy deployed on your FreeIPA server(s).
3. Ensure the relevant log paths are accessible:
   - IPA API: `/var/log/httpd/error_log` (ipa_api data stream)
"""
severity = "medium"
tags = [
    "Domain: Identity",
    "Data Source: FreeIPA",
    "Data Source: FreeIPA API",
    "Use Case: Threat Detection",
    "Tactic: Defense Evasion",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "esql"

query = '''
from logs-freeipa.ipa_api-*
| where event.action == "pwpolicy_mod" and event.outcome == "success"
'''


[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id = "T1484"
name = "Domain or Tenant Policy Modification"
reference = "https://attack.mitre.org/techniques/T1484/"


[rule.threat.tactic]
id = "TA0005"
name = "Defense Evasion"
reference = "https://attack.mitre.org/tactics/TA0005/"

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "user.name",
    "source.ip",
    "event.action",
    "event.outcome",
    "freeipa.api.parameters",
]
