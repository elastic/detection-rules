[metadata]
creation_date = "2026/03/28"
integration = ["freeipa"]
maturity = "development"
updated_date = "2026/03/28"

[rule]
author = ["Elastic"]
description = """
Detects a high number of Kerberos authentication failures across many distinct principals from a single source IP
over a 24-hour period. This catches patient password spraying that stays below the per-interval threshold by
distributing attempts across hours. The combination of high failure count and high principal diversity from one
source is a strong indicator of spray activity.
"""
false_positives = [
    """
    A NAT gateway or proxy aggregating authentication from many users may appear as a single source IP with
    failures across multiple principals. Exclude known NAT/proxy IPs or increase the unique principal threshold
    to account for the expected user population behind the gateway.
    """,
]
from = "now-25h"
interval = "1h"
language = "kuery"
license = "Elastic License v2"
name = "FreeIPA Slow Password Spray Over 24 Hours"
note = """## Triage and analysis

### Investigating FreeIPA Slow Password Spray Over 24 Hours

Password spraying tries a small number of common passwords against many accounts to avoid lockout. Sophisticated attackers spread spray attempts over 24 hours, staying below short-window detection thresholds. This rule aggregates by day to catch the cumulative pattern — a single source IP generating failures across 10 or more distinct principals with at least 50 total failures.

### Possible investigation steps

- Check `source.ip` and `source.geo` to determine the origin. External sources are high risk.
- Review `Esql.unique_principals` to understand the breadth of the spray.
- Examine the individual `freeipa.kdc.client_principal` values to determine if specific account types were targeted (admins, service accounts, specific naming patterns).
- Check for any successful authentications from the same source IP during the same period — a success amid many failures strongly suggests the spray found a valid credential.
- Correlate with the standard password spraying rule to confirm this was below the short-window threshold.

### Response and remediation

- Block the source IP at the network perimeter immediately.
- Force password resets for any principals that had successful authentications from the source IP during the spray window.
- Review password policy complexity requirements via `ipa pwpolicy-show`.
- Enable FreeIPA OTP/2FA for high-value accounts.
- Monitor for follow-up lateral movement from any successfully compromised accounts.
"""
references = [
    "https://attack.mitre.org/techniques/T1110/003/",
    "https://specterops.io/blog/2019/11/25/attacking-freeipa-part-i-authentication/",
]
risk_score = 73
rule_id = "eec14b69-b4dd-4a35-bae5-83b2bf6fe303"
setup = """## Setup

This rule requires the FreeIPA integration to be installed and configured to collect logs from FreeIPA servers.

### FreeIPA Integration Setup
1. Install the FreeIPA integration in Kibana Fleet.
2. Add the integration to an Elastic Agent policy deployed on your FreeIPA server(s).
3. Ensure the relevant log paths are accessible:
   - KDC: `/var/log/krb5kdc.log` (kdc data stream)
"""
severity = "high"
tags = [
    "Domain: Identity",
    "Data Source: FreeIPA",
    "Data Source: FreeIPA KDC",
    "Use Case: Threat Detection",
    "Use Case: Identity and Access Audit",
    "Tactic: Credential Access",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
index = ["logs-freeipa.kdc-*"]
type = "threshold"

query = '''
event.dataset: "freeipa.kdc" and event.outcome: "failure"
'''



[rule.threshold]
field = ["source.ip"]
value = 50
[[rule.threshold.cardinality]]
field = "freeipa.kdc.client_principal"
value = 10

[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id = "T1110"
name = "Brute Force"
reference = "https://attack.mitre.org/techniques/T1110/"
[[rule.threat.technique.subtechnique]]
id = "T1110.003"
name = "Password Spraying"
reference = "https://attack.mitre.org/techniques/T1110/003/"


[rule.threat.tactic]
id = "TA0006"
name = "Credential Access"
reference = "https://attack.mitre.org/tactics/TA0006/"

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "source.ip",
    "source.geo.country_name",
    "freeipa.kdc.client_principal",
    "freeipa.kdc.error_code",
    "event.outcome",
    "Esql.failure_count",
    "Esql.unique_principals",
    "day_bucket",
]
