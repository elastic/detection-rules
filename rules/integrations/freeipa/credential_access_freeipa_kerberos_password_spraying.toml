[metadata]
creation_date = "2026/03/28"
integration = ["freeipa"]
maturity = "development"
updated_date = "2026/03/28"

[rule]
author = ["Elastic"]
description = """
Identifies Kerberos pre-authentication failures across many distinct principals from a single source IP, indicative of
a password spraying attack against a FreeIPA KDC. Adversaries use password spraying to test common passwords across
many accounts while staying below per-account lockout thresholds. The default threshold of 15 unique principals in 5
minutes should be tuned to the environment's size and authentication patterns.
"""
false_positives = [
    """
    Jump hosts or bastion servers that authenticate on behalf of many users may trigger this rule. Exclude known
    bastion or proxy IPs. Automated provisioning systems that validate credentials for many accounts in batch may
    also cause false positives. Tune the cardinality threshold based on the environment.
    """,
]
from = "now-9m"
interval = "5m"
language = "esql"
license = "Elastic License v2"
name = "FreeIPA Kerberos Password Spraying Attempt"
note = """## Triage and analysis

### Investigating FreeIPA Kerberos Password Spraying Attempt

Password spraying targets many accounts with a small set of commonly used passwords, staying below per-account lockout thresholds. This rule detects a single source IP generating pre-authentication failures for many distinct Kerberos principals. The cardinality threshold should be tuned — small environments with few users need a lower threshold, while large environments may need a higher one.

### Possible investigation steps

- Review the `source.ip` and `source.geo` fields to determine the origin. External IPs are high risk.
- List all targeted principals by querying `freeipa.kdc.error_code:PREAUTH_FAILED AND source.ip:<ip>` in the same time window.
- Check if any of the targeted principals had a successful authentication (`event.outcome:success`) shortly after the spray — this indicates a compromised account.
- Look for `LOCKED_OUT` events to assess the blast radius of the attack.
- Correlate with LDAP bind failures in the `directory_access` data stream from the same source.
- Check the `freeipa.kdc.request_type` field — AS_REQ spraying is initial access; TGS_REQ spraying against service principals suggests kerberoasting.

### Response and remediation

- Block the source IP at the network perimeter.
- Force password resets for any accounts that had successful authentications from the attacking source.
- Review password policy strength via `ipa pwpolicy-show` and consider increasing minimum length or complexity.
- Enable OTP/2FA for admin and service accounts.
- Review account lockout policy settings to ensure they are appropriate.
"""
references = [
    "https://attack.mitre.org/techniques/T1110/003/",
    "https://specterops.io/blog/2019/11/25/attacking-freeipa-part-i-authentication/",
]
risk_score = 73
rule_id = "56ab69e7-29cf-4e84-88bd-23ed7d826544"
setup = """## Setup

This rule requires the FreeIPA integration to be installed and configured to collect logs from FreeIPA servers.

### FreeIPA Integration Setup
1. Install the FreeIPA integration in Kibana Fleet.
2. Add the integration to an Elastic Agent policy deployed on your FreeIPA server(s).
3. Ensure the relevant log paths are accessible:
   - KDC: `/var/log/krb5kdc.log` (kdc data stream)
"""
severity = "high"
tags = [
    "Domain: Identity",
    "Data Source: FreeIPA",
    "Data Source: FreeIPA KDC",
    "Use Case: Threat Detection",
    "Use Case: Identity and Access Audit",
    "Tactic: Credential Access",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "esql"

query = '''
from logs-freeipa.kdc-*
| where event.outcome == "failure" and freeipa.kdc.error_code == "PREAUTH_FAILED"
| stats Esql.failure_count = count(*), Esql.unique_principals = count_distinct(freeipa.kdc.client_principal) by source.ip
| where Esql.failure_count >= 10 and Esql.unique_principals >= 15
'''


[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id = "T1110"
name = "Brute Force"
reference = "https://attack.mitre.org/techniques/T1110/"
[[rule.threat.technique.subtechnique]]
id = "T1110.003"
name = "Password Spraying"
reference = "https://attack.mitre.org/techniques/T1110/003/"


[rule.threat.tactic]
id = "TA0006"
name = "Credential Access"
reference = "https://attack.mitre.org/tactics/TA0006/"

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "source.ip",
    "source.geo.country_name",
    "freeipa.kdc.client_principal",
    "freeipa.kdc.error_code",
    "freeipa.kdc.request_type",
    "event.outcome",
    "Esql.failure_count",
    "Esql.unique_principals",
]
