[metadata]
creation_date = "2026/03/28"
integration = ["freeipa"]
maturity = "development"
updated_date = "2026/03/28"

[rule]
author = ["Elastic"]
description = """
Identifies a high number of LDAP simple bind failures from a single source IP against the FreeIPA 389 Directory Server,
indicative of a credential stuffing or brute force attack over LDAP. LDAP simple binds transmit credentials in
cleartext (unless protected by TLS) and are less common than SASL/GSSAPI in properly configured FreeIPA environments.
The default threshold of 20 failures in 5 minutes should be tuned to the environment.
"""
false_positives = [
    """
    Legacy applications using LDAP simple bind with misconfigured or expired credentials may generate repeated
    failures. Exclude known application service IPs. SSSD clients use SASL/GSSAPI by default and should not
    trigger this rule.
    """,
]
from = "now-9m"
interval = "5m"
language = "esql"
license = "Elastic License v2"
name = "FreeIPA LDAP Bind Brute Force Attempt"
note = """## Triage and analysis

### Investigating FreeIPA LDAP Bind Brute Force Attempt

FreeIPA's 389 Directory Server supports LDAP BIND operations for authentication. Simple binds send credentials directly, while SASL/GSSAPI uses Kerberos. A high volume of simple bind failures from one source indicates credential guessing. Simple bind is less common in healthy FreeIPA environments since SSSD uses GSSAPI, so any significant volume of simple bind failures warrants investigation.

### Possible investigation steps

- Review the `source.ip` to determine if the source is internal or external.
- Check `freeipa.directory.bind_dn` to identify which accounts are being targeted.
- Look at `freeipa.directory.ssl` to determine if the binds are encrypted (TLS) or cleartext.
- Query for successful BIND results (`freeipa.directory.result_code:0`) from the same source to check if any credentials were guessed correctly.
- Correlate with the `kdc` data stream for Kerberos authentication failures from the same source.
- Check if the source IP appears in other data streams (ipa_api, ca_audit) for post-exploitation activity.

### Response and remediation

- Block the source IP at the network perimeter.
- If any binds succeeded, reset passwords for those accounts immediately.
- Restrict LDAP simple bind to TLS-only connections or disable it entirely in favour of SASL/GSSAPI.
- Review 389DS access control to restrict bind operations from untrusted networks.
"""
references = [
    "https://attack.mitre.org/techniques/T1110/001/",
    "https://specterops.io/blog/2019/11/25/attacking-freeipa-part-i-authentication/",
]
risk_score = 73
rule_id = "a217ee15-b11c-4529-bb46-1531a22846d6"
setup = """## Setup

This rule requires the FreeIPA integration to be installed and configured to collect logs from FreeIPA servers.

### FreeIPA Integration Setup
1. Install the FreeIPA integration in Kibana Fleet.
2. Add the integration to an Elastic Agent policy deployed on your FreeIPA server(s).
3. Ensure the relevant log paths are accessible:
   - 389DS access: `/var/log/dirsrv/slapd-*/access` (directory_access data stream)
"""
severity = "high"
tags = [
    "Domain: Identity",
    "Data Source: FreeIPA",
    "Data Source: FreeIPA Directory Server",
    "Use Case: Threat Detection",
    "Use Case: Identity and Access Audit",
    "Tactic: Credential Access",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "esql"

query = '''
from logs-freeipa.directory_access-*
| where freeipa.directory.operation == "RESULT"
    and freeipa.directory.tag_number == 97
    and freeipa.directory.result_code >= 1
| stats Esql.failure_count = count(*) by source.ip
| where Esql.failure_count >= 20
'''


[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id = "T1110"
name = "Brute Force"
reference = "https://attack.mitre.org/techniques/T1110/"
[[rule.threat.technique.subtechnique]]
id = "T1110.001"
name = "Password Guessing"
reference = "https://attack.mitre.org/techniques/T1110/001/"


[rule.threat.tactic]
id = "TA0006"
name = "Credential Access"
reference = "https://attack.mitre.org/tactics/TA0006/"

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "source.ip",
    "freeipa.directory.bind_dn",
    "freeipa.directory.bind_method",
    "freeipa.directory.result_code",
    "freeipa.directory.ssl",
    "Esql.failure_count",
]
