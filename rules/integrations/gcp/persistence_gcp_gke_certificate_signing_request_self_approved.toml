[metadata]
creation_date = "2026/07/08"
integration = ["gcp"]
maturity = "production"
min_stack_comments = "mv_contains ES|QL function only available post 9.2 in tech preview"
min_stack_version = "9.2.0"
updated_date = "2026/07/08"

[rule]
author = ["Elastic"]
description = """
Detects when the same non-system GKE identity creates a CertificateSigningRequest (CSR) and then updates or patches that
same CSR within five minutes, consistent with self-approval abuse. Attackers who gain CSR create and approval RBAC can
submit a certificate request and approve it themselves to obtain a long-lived client certificate without involving
cluster operators, a pattern documented in Kubernetes persistence research and adversary emulation.
"""
false_positives = [
    """
    Automation that both submits and approves CSRs in one workflow may trigger this rule. Baseline cert-manager or
    internal PKI pipelines and tune exclusions for known service accounts.
    """,
]
from = "now-6m"
language = "esql"
license = "Elastic License v2"
name = "GKE Certificate Signing Request Self-Approved"
note = """## Triage and analysis

### Investigating GKE Certificate Signing Request Self-Approved

This rule groups CSR create, update, and patch events by `client.user.email` and `gcp.audit.resource_name`. An alert
means the same identity both submitted and modified the same CSR object within five minutes — a strong indicator of
manual self-approval rather than normal kube-controller-manager auto-approval of node certificates.

### Possible investigation steps

- Review `Esql.event_action_values` for the sequence of create followed by update or patch.
- Inspect `gcp.audit.request.spec.signerName` and decode `gcp.audit.request.spec.request` on create events for the
  requested identity.
- Validate whether the actor should hold both CSR create and approval permissions.
- Hunt for subsequent API activity authenticated as the minted certificate identity.

### Response and remediation

- Revoke or deny the CSR, remove approval RBAC from untrusted principals, and rotate cluster signing credentials if
  abuse is confirmed.

## Setup

The GCP Fleet integration with GKE audit logs enabled is required to be compatible with this rule."""
references = [
    "https://kubernetes.io/docs/reference/access-authn-authz/certificate-signing-requests/",
    "https://kubernetes.io/docs/concepts/security/rbac-good-practices/",
    "https://stratus-red-team.cloud/attack-techniques/kubernetes/k8s.persistence.create-client-certificate/",
    "https://raesene.github.io/blog/2022/12/21/Kubernetes-persistence-with-Tocan-and-Teisteanas/",
    "https://www.aquasec.com/blog/kubernetes-rbac-privilige-escalation/",
    "https://attack.mitre.org/techniques/T1098/",
]
risk_score = 73
rule_id = "6cfd94a2-8966-4a1f-8efd-5ce10d9fbb01"
severity = "high"
tags = [
    "Domain: Cloud",
    "Domain: Kubernetes",
    "Data Source: GCP",
    "Data Source: Google Cloud Platform",
    "Use Case: Threat Detection",
    "Tactic: Persistence",
    "Tactic: Privilege Escalation",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "esql"

query = '''
from logs-gcp.audit-* metadata _id, _index, _version
| where data_stream.dataset == "gcp.audit"
    and service.name == "k8s.io"
    and event.outcome == "success"
    and event.action in (
      "io.k8s.certificates.v1.certificatesigningrequests.create",
      "io.k8s.certificates.v1.certificatesigningrequests.update",
      "io.k8s.certificates.v1.certificatesigningrequests.patch"
    )
    and client.user.email is not null
    and gcp.audit.resource_name is not null
    and not client.user.email in ("system:gcp-controller-manager", "kubelet-bootstrap", "kubelet-nodepool-bootstrap")
    and not client.user.email like "system:node:*"
    and not client.user.email like "system:serviceaccount:kube-system:*"
| stats
    Esql.event_action_values = values(event.action),
    Esql.timestamp_first_seen = min(@timestamp),
    Esql.timestamp_last_seen = max(@timestamp),
    Esql.timestamp_values = values(@timestamp),
    Esql.source_ip_values = values(source.ip),
    Esql.user_agent_values = values(user_agent.original)
  by client.user.email, gcp.audit.resource_name
| where
    mv_contains(Esql.event_action_values, "io.k8s.certificates.v1.certificatesigningrequests.create")
    and (
      mv_contains(Esql.event_action_values, "io.k8s.certificates.v1.certificatesigningrequests.update")
      or mv_contains(Esql.event_action_values, "io.k8s.certificates.v1.certificatesigningrequests.patch")
    )
    and date_diff("seconds", Esql.timestamp_first_seen, Esql.timestamp_last_seen) <= 300
| keep client.user.email, gcp.audit.resource_name, Esql.*
'''

