[metadata]
creation_date = "2026/05/10"
integration = ["gcp"]
maturity = "development"
updated_date = "2026/05/10"

[rule]
author = ["Ivan Saakov"]
description = """
Detects when a GCP service account is impersonated by generating a short-lived access token or identity token
on behalf of another service account via the Service Account Credentials API. Service account impersonation
allows a principal to act as a different service account without possessing its key, by calling
generateAccessToken or generateIdToken. An attacker who has the iam.serviceAccounts.actAs permission on a
higher-privilege service account can escalate their privileges and access resources they would otherwise not
be permitted to reach.
"""
false_positives = [
    """
    Service account impersonation is used legitimately by Cloud Run services, Cloud Functions, and CI/CD
    pipelines that use Workload Identity Federation. Validate whether the impersonating principal and target
    service account combination is expected. New or unknown impersonation chains should be reviewed.
    """,
]
from = "now-6m"
index = ["filebeat-*", "logs-gcp*"]
language = "kuery"
license = "Elastic License v2"
name = "GCP Service Account Impersonation via Access Token Generation"
note = """## Triage and analysis

### Investigating GCP Service Account Impersonation via Access Token Generation

The `generateAccessToken` and `generateIdToken` methods allow a caller to obtain tokens for a different
service account. This is the foundation of GCP impersonation chains and Workload Identity Federation.

#### Possible investigation steps

- **Identify the caller**: Review `gcp.audit.authentication_info.principal_email` — who is requesting the token?
- **Identify the target**: Review `gcp.audit.resource_name` — which service account is being impersonated?
- **Assess the privilege delta**: Does the target service account have more permissions than the caller?
- **Check for chaining**: Is the caller itself a service account? Is this a multi-hop impersonation chain?
- **Verify the use case**: Is this a known Workload Identity or Cloud Run service account pattern?

### False positive analysis

- Workload Identity Federation uses impersonation for workloads running outside GCP.
- Cloud Run and Cloud Functions may impersonate other service accounts for authorized resource access.
- CI/CD pipelines may use impersonation for least-privilege deployment patterns.

### Response and remediation

- Revoke the iam.serviceAccounts.actAs permission from the caller if unauthorized.
- Rotate the impersonated service account key if long-lived credentials may have been obtained.
- Review what API calls were made using the impersonated token.
- Audit the IAM bindings for all service accounts to identify unexpected actAs grants.
"""
references = [
    "https://cloud.google.com/iam/docs/create-short-lived-credentials-direct",
    "https://cloud.google.com/iam/docs/impersonating-service-accounts",
]
risk_score = 47
rule_id = "48bb37e5-2685-4a9d-b180-3623a81780d7"
severity = "medium"
tags = [
    "Domain: Cloud",
    "Data Source: GCP",
    "Data Source: Google Cloud Platform",
    "Data Source: GCP Audit Logs",
    "Use Case: Identity and Access Audit",
    "Resources: Investigation Guide",
    "Tactic: Privilege Escalation",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
data_stream.dataset:gcp.audit and
event.action:(google.iam.credentials.v1.IAMCredentials.GenerateAccessToken or google.iam.credentials.v1.IAMCredentials.GenerateIdToken) and
event.outcome:success
'''

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "gcp.audit.authentication_info.principal_email",
    "event.action",
    "gcp.audit.resource_name",
    "cloud.project.id",
    "source.ip",
    "event.outcome",
]

[[rule.threat]]
framework = "MITRE ATT&CK"

[[rule.threat.technique]]
id = "T1134"
name = "Access Token Manipulation"
reference = "https://attack.mitre.org/techniques/T1134/"

[[rule.threat.technique.subtechnique]]
id = "T1134.001"
name = "Token Impersonation/Theft"
reference = "https://attack.mitre.org/techniques/T1134/001/"

[rule.threat.tactic]
id = "TA0004"
name = "Privilege Escalation"
reference = "https://attack.mitre.org/tactics/TA0004/"
