[rule.investigation_fields]
field_names = [
    "@timestamp",
    "client.user.email",
    "source.ip",
    "user_agent.original",
    "event.action",
    "event.outcome",
    "gcp.audit.resource_name",
    "Esql.csr_request",
    "Esql.csr_pem",
    "Esql.csr_der",
    "data_stream.namespace",
]
