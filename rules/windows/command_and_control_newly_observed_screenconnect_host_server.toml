[metadata]
creation_date = "2026/03/09"
integration = ["endpoint"]
maturity = "production"
updated_date = "2026/03/30"

[rule]
author = ["Elastic"]
description = """
Detects when the ScreenConnect client (ConnectWise Control) connects to a newly observed host server that is not the official ScreenConnect cloud. ScreenConnect is a common RMM/remote access tool abused for C2 and persistence. Self-hosted or non-standard relay servers may indicate abuse or compromise. The rule aggregates by server host (parsed from the client command line), requires first-time observation within the rule window, and limits to a single host to reduce noise.
"""
from = "now-5d"
interval = "6m"
language = "esql"
license = "Elastic License v2"
name = "Newly Observed ScreenConnect Host Server"
references = [
    "https://attack.mitre.org/techniques/T1219/002/",
    "https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-025a",
]
risk_score = 73
rule_id = "a8b2c4d6-e8f0-12a4-b6c8-d0e2f4a6b8c0"
severity = "high"
tags = [
    "Domain: Endpoint",
    "OS: Windows",
    "Use Case: Threat Detection",
    "Tactic: Command and Control",
    "Resources: Investigation Guide",
    "Data Source: Elastic Defend"
]
timestamp_override = "event.ingested"
type = "esql"

query = '''
from logs-endpoint.events.process-*
| where event.category == "process" and event.type == "start" and (process.name == "ScreenConnect.ClientService.exe" or process.code_signature.subject_name == "ConnectWise, LLC")
| grok process.command_line """e=Access&y=Guest&h=(?<Esql.screenconnect_server>[^&]+)&p"""
| where Esql.screenconnect_server is not null and not Esql.screenconnect_server like "*.screenconnect.com"
| stats Esql.count_distinct_host_id = count_distinct(host.id),
        Esql.first_time_seen = min(@timestamp),
        Esql.user_name_values = values(user.name),
        Esql.command_line_values = values(process.command_line),
        Esql.host_id_values = values(host.id),
        Esql.host_name_values = values(host.name),
        Esql.process_entity_id_values = values(process.entity_id) by Esql.screenconnect_server
| eval Esql.recent = date_diff("minute", Esql.first_time_seen, now())
| where Esql.recent <= 6 and Esql.count_distinct_host_id == 1
| eval host.id = mv_first(Esql.host_id_values),
       host.name = mv_first(Esql.host_name_values),
       process.command_line = mv_first(Esql.command_line_values),
       process.entity_id = mv_first(Esql.process_entity_id_values)
| keep host.id, host.name, process.command_line, process.entity_id, Esql.screenconnect_server, Esql.user_name_values, Esql.first_time_seen
'''

note = """## Triage and analysis

### Investigating Newly Observed ScreenConnect Host Server

This alert fires when a ScreenConnect client connects to a non-standard relay host for the first time. The query uses a wide lookback to establish that the relay has not been seen before, but a narrow recency filter aligned with the execution interval to keep alerts timely. Treat it as a cue that the relay may be unauthorized, not proof. The alert preserves the parsed relay in `Esql.screenconnect_server`, the client's `process.entity_id`, user context in `Esql.user_name_values`, the first-seen time in `Esql.first_time_seen`, and one representative `process.command_line`. Process identity (`process.executable`, `process.code_signature.*`) and lineage (`process.parent.*`) must still be recovered from source events using the preserved `process.entity_id`. Prioritize decoding the alert-preserved fields, then use `process.entity_id` to recover client identity and launch context before deciding whether the relay and host fit approved remote-access use.

#### Possible investigation steps

- What do the alert-preserved fields tell you about this new ScreenConnect relay?
  - Focus: the parsed relay in `Esql.screenconnect_server`, the user context in `Esql.user_name_values`, the first-seen time in `Esql.first_time_seen`, plus `host.id`, `host.name`, and the representative `process.command_line`, treating `Esql.*` fields as alert-local values rather than source-event records.
  - Implication: supports concern when the preserved relay is an IP literal, an unknown external domain, or not approved infrastructure; weaker evidence when the relay already points to a documented internal relay or managed service provider host.

- Does the ScreenConnect client binary and install path match approved software on this host?
  - Focus: use the alert's `process.entity_id` and `host.id` to look up the source process event and recover `process.executable`, `process.pe.original_file_name`, `process.code_signature.subject_name`, and `process.code_signature.trusted`. $investigate_0
  - Implication: treat the client as suspicious when it is unsigned, portable, user-writable, mismatched to its original file name, or inconsistent with approved ScreenConnect deployment paths; treat identity as consistent only when the signer and path match the expected client installation layout.

- Does the parent and ancestry explain why this host initiated a new relay connection now?
  - Focus: from the source event recovered via the alert's `process.entity_id`, check `process.parent.executable`, `process.parent.command_line`, `process.Ext.ancestry`, and `process.Ext.session_info.logon_type`.
  - Implication: the launch path is harder to justify when a script host, Office application, installer, or unexpected interactive session starts the client; it is easier to explain when the lineage resolves to an approved service deployment, support workflow, or management tooling chain.

- Do network events show the same host or recovered process contacting infrastructure consistent with the parsed ScreenConnect relay?
  - Why: the parsed relay in `Esql.screenconnect_server` is an alert-level field, so you still need source DNS and connection events to confirm what the host actually contacted.
  - Focus: DNS "lookup_result" events for the parsed `Esql.screenconnect_server` and related connection events scoped to the alert's `process.entity_id` and `host.id`, with attention to `dns.question.name`, `dns.resolved_ip`, `destination.ip`, and `destination.as.organization.name`. $investigate_1
  - Implication: supports concern when the host or process reaches public infrastructure with no recognizable ownership, or when multiple suspicious destinations cluster around the same ScreenConnect activity; less concerning when the resolved infrastructure matches the relay domain and belongs to a known vendor or hosting provider. Missing network telemetry is unresolved, not benign.

- Does the host context fit managed service provider or internal ScreenConnect use?
  - Focus: the `host.id` and `Esql.user_name_values` pairing from the alert, whether the same `Esql.screenconnect_server`, client signer, and parent workflow recur across a known admin or helpdesk host group.
  - Implication: more concerning if ScreenConnect appears on end-user or sensitive hosts that are not typically managed remotely, or if the user and host evidence do not fit the claimed workflow; more explainable when the same group of managed hosts, operator identity, and deployment pattern recur together.

- Have other hosts in the environment resolved the same ScreenConnect relay domain?
  - Focus: DNS events across all hosts where `dns.question.name` matches the relay from `Esql.screenconnect_server` over the last 30 days. $investigate_2
  - Implication: multiple unrelated hosts resolving the same relay suggests either a coordinated campaign or a broad rollout; a single host resolving it stays locally bounded.

- Does this host show related alerts or adjacent remote-access tooling that suggest broader compromise?
  - Focus: related alerts for the same `host.id` in the last 48 hours, plus adjacent remote-access, persistence, credential-access, or delivery activity, especially renamed or portable ConnectWise or ScreenConnect binaries tied to the same relay. $investigate_3
  - Implication: suggests broader host compromise when the asset also shows suspicious precursor delivery, persistence, credential theft, or additional remote-access tooling; stays locally bounded when the surrounding alert history is limited to expected admin activity or unrelated benign maintenance on the same host.

- What disposition is supported by the relay, source-event, identity, lineage, network, host-role, and scope evidence?
  - Focus: weigh the parsed relay, source-event context, client identity, launch lineage, contacted infrastructure, host role, and any relay or host spread seen in related alerts.
  - Implication: escalate when those evidence categories point to an unauthorized relay, unexpected client deployment, suspicious network activity, or broader compromise; close only when the relay, client identity, infrastructure, and host role all align with a documented ScreenConnect workflow and no contradictory evidence remains; if answers stay mixed or visibility is incomplete, preserve artifacts and escalate.

### False positive analysis

- Legitimate self-hosted ScreenConnect or managed service provider-operated ConnectWise Control can trigger this rule. Confirm it only when the same `Esql.screenconnect_server`, recovered `process.executable`, signer, parent workflow, and DNS or connection evidence all align with one approved and authorized operator or service provider. If change records are unavailable, require that the same relay, client identity, and admin host group recur across prior alerts before closing as benign.
- Before creating an exception, confirm the relay is authorized through organizational records, then build the exception on the relay domain in `process.command_line`. Avoid exceptions on `host.name` or `host.id` alone, since the rule fires per host and those would suppress only one endpoint.

### Response and remediation

- If confirmed benign, reverse any temporary containment and document the authorized relay, client signer and path, and source-event lineage. Build the exception on the relay domain in `process.command_line` once authorization is confirmed through organizational records.
- If suspicious but unconfirmed, preserve the alert's `process.entity_id`, `process.command_line`, `Esql.screenconnect_server`, and any linked `dns.question.name` or `destination.ip` evidence. Apply reversible containment such as temporary DNS or egress blocking for the relay host. Escalate to host isolation only when the relay, lineage, or network evidence shows meaningful risk and the host's support role can tolerate it. Avoid destructive cleanup until scope is clearer.
- If confirmed malicious, document the alert's `process.entity_id`, recovered `process.executable`, `process.code_signature.subject_name`, `process.command_line`, `Esql.screenconnect_server`, and any confirmed `dns.question.name` or `destination.ip` values before initiating response actions. Use available endpoint response integrations to isolate the host when the relay, client identity, lineage, or contacted infrastructure indicates unauthorized remote access. If direct endpoint response is unavailable, escalate with the documented artifacts to the team that can act.
- Review how the software was installed, who operated the relay, and whether additional remote-access tooling or credential exposure is present on the host. Then block the malicious relay host and any confirmed relay IPs, and remove or disable the unauthorized ScreenConnect client, service, persistence mechanism, or installer artifacts identified during the investigation.
- After containment, enforce approved-relay policy for remote-access tools and retain Elastic Defend process and network telemetry needed to validate future relay changes.
"""

setup = """## Setup

This rule is designed for data generated by [Elastic Defend](https://www.elastic.co/security/endpoint-security), which provides native endpoint detection and response, along with event enrichments designed to work with our detection rules.

Setup instructions: https://ela.st/install-elastic-defend
"""

[rule.investigation_fields]
field_names = [
    "host.id",
    "host.name",
    "process.command_line",
    "Esql.screenconnect_server",
    "Esql.user_name_values",
    "Esql.first_time_seen",
    "process.entity_id",
]

[[transform.investigate]]
label = "Process events for the ScreenConnect client"
description = ""
providers = [
  [
    { excluded = false, field = "process.entity_id", queryType = "phrase", value = "{{process.entity_id}}", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" },
    { excluded = false, field = "event.category", queryType = "phrase", value = "process", valueType = "string" }
  ]
]
relativeFrom = "now-1h"
relativeTo = "now"

[[transform.investigate]]
label = "Network events for the ScreenConnect client"
description = ""
providers = [
  [
    { excluded = false, field = "process.entity_id", queryType = "phrase", value = "{{process.entity_id}}", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" },
    { excluded = false, field = "event.category", queryType = "phrase", value = "network", valueType = "string" }
  ]
]
relativeFrom = "now-1h"
relativeTo = "now"

[[transform.investigate]]
label = "Hosts resolving the same ScreenConnect relay domain"
description = ""
providers = [
  [
    { excluded = false, field = "dns.question.name", queryType = "phrase", value = "{{Esql.screenconnect_server}}", valueType = "string" }
  ]
]
relativeFrom = "now-30d/d"
relativeTo = "now"

[[transform.investigate]]
label = "Alerts associated with the host"
description = ""
providers = [
  [
    { excluded = false, field = "event.kind", queryType = "phrase", value = "signal", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" }
  ]
]
relativeFrom = "now-48h/h"
relativeTo = "now"

