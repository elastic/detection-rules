[metadata]
creation_date = "2021/10/19"
integration = ["windows"]
maturity = "production"
updated_date = "2026/03/30"

[rule]
author = ["Elastic"]
description = """
Detects PowerShell script block content that uses CopyFromScreen with .NET bitmap classes to capture screenshots.
Attackers use screen capture to collect on-screen information and credentials.
"""
from = "now-9m"
index = ["logs-windows.powershell*", "winlogbeat-*"]
language = "kuery"
license = "Elastic License v2"
name = "PowerShell Suspicious Script with Screenshot Capabilities"
references = ["https://docs.microsoft.com/en-us/dotnet/api/system.drawing.graphics.copyfromscreen"]
risk_score = 73
rule_id = "959a7353-1129-4aa7-9084-30746b256a70"
severity = "high"
tags = [
    "Domain: Endpoint",
    "OS: Windows",
    "Use Case: Threat Detection",
    "Tactic: Collection",
    "Resources: Investigation Guide",
    "Data Source: PowerShell Logs",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
event.category:process and host.os.type:windows and
  powershell.file.script_block_text : (
    CopyFromScreen and
    ("System.Drawing.Bitmap" or "Drawing.Bitmap")
  ) and not user.id : "S-1-5-18"
'''

note = """## Triage and analysis

### Investigating PowerShell Suspicious Script with Screenshot Capabilities

This alert fires when PowerShell script block logging preserves screenshot-capture logic built around "CopyFromScreen" and bitmap classes. Treat it as evidence of interactive screen collection, not proof that images were saved or transferred. Prioritize what the preserved script shows about capture scope, what the full script does with the images, and whether nearby process, file, and network telemetry shows staging or transfer.

#### Possible investigation steps

- Does the alert-preserved script content indicate a bounded screenshot action or deliberate repeated screen collection?
  - Focus: the preserved script text on the alert, any associated `file.path`, and the alert scope from `@timestamp`, `host.id`, and `user.id`.
  - Implication: supports deliberate collection when the script loops, captures full desktops, or targets multiple monitors or regions; weaker support when the preserved content shows a single bounded capture tied to a documented support or test action.

- Does the reconstructed script add save, encode, archive, or transfer logic that changes risk?
  - Why: screenshot collection becomes materially higher risk once the same script writes images, serializes them, compresses them, or stages them for outbound transfer.
  - Focus: `powershell.file.script_block_id`, `powershell.sequence`, `powershell.total`, and `powershell.file.script_block_length` needed to rebuild adjacent fragments, then the reconstructed script body for output paths, image encoding, archive helpers, or remote destinations. $investigate_0
  - Implication: staging becomes more likely when reconstruction shows image saves, compression, archiving, or transfer logic; risk stays narrower when the completed script only captures or previews the screen with no storage or delivery path.

- Can you recover the PowerShell process and explain how it was launched?
  - Why: the launch chain distinguishes an approved support tool from an ad hoc script or malicious wrapper that happens to use the same .NET screen-capture calls.
  - Focus: same-host process events around the alert time, pivoting on the alert's `process.pid` and `host.id` to find the matching process start event, then `process.command_line`, `process.parent.executable`, `process.parent.command_line`, and `process.Ext.session_info.logon_type` to recover the launch context. $investigate_1
  - Hint: if the transform returns no process start event, try expanding the time window before concluding endpoint data is unavailable. If the process event still cannot be found, keep later file and network review bounded to the same host and alert time rather than assuming a wider process scope.
  - Implication: supports an approved-tool explanation when the recovered command line and parent chain match a sanctioned support or QA launcher; favors ad hoc or malicious use when the process runs from user-writable paths, inherits an unusual parent, or lands in an unexpected session type.

- Does the user-host pattern fit a documented support, accessibility, or QA workflow?
  - Focus: the same `user.id` and `host.id`, the recovered `process.parent.executable`, and any case evidence that can prove the workflow such as a support ticket or QA job identifier; if case data is unavailable, fall back to whether the same pairing and launcher recur in prior alerts from this rule.
  - Implication: more concerning when the same user-host pair has no recurring support or QA pattern, the launcher is new for that pairing, or the host is used for privileged sessions; more explainable when the same pairing and launcher recur in documented support or test cases with bounded capture behavior.

- Do file events show screenshot output, staging artifacts, or suspicious script provenance?
  - Focus: same-host file events for the recovered `process.entity_id` when available, with attention to `file.path`, `file.extension`, `file.Ext.header_bytes`, `file.origin_url` or `file.Ext.windows.zone_identifier` for script provenance, and later reuse of a written path as `process.executable`.
  - Implication: artifact staging is more likely when the script arrives from download locations, writes screenshots or archives to user-writable paths, or produces files that later execute; artifact evidence is less concerning when source and outputs stay inside a controlled support or QA path with no staging pattern.

- Do network events show transfer of captured images or related staging activity?
  - Focus: same-host network events for the recovered `process.entity_id` when available, separating DNS "lookup_result" events from connection events and using `dns.resolved_ip` to bridge `dns.question.name` to `destination.ip`; treat `destination.as.organization.name` as ownership context, not a verdict.
  - Implication: delivery risk increases when the process resolves or reaches rare external infrastructure, remote storage, or destinations named in the script; delivery risk falls when traffic stays on documented internal transfer, proxy, or QA infrastructure. Missing network telemetry is unresolved, not benign.

- Does the host or session context suggest privileged or sensitive on-screen data could have been exposed?
  - Why: the same capture script is far more consequential on admin workstations, jump hosts, finance endpoints, or remote sessions than on a lab box used for UI testing.
  - Focus: the recovered `process.Ext.session_info.logon_type` and the `user.id`/`host.id` pairing. If the session is remote and origin matters, bridge `process.Ext.authentication_id` to authentication events to recover `source.ip`; if that bridge is unavailable, treat origin as unresolved.
  - Implication: raise urgency when the visible desktop likely contained credentials, privileged consoles, finance data, or remote admin sessions; keep urgency lower when the session is local, low sensitivity, and consistent with a documented support or QA task.

- If the local evidence stays suspicious, does related alert history show isolated screen capture or broader collection on this user or host?
  - Focus: related alerts for the same `user.id` and `host.id` in the last 48 hours, using the user view to test recurrence across hosts or sessions and the host view to spot same-host archive helpers, staging alerts, or alternate .NET/native capture routines that reuse the same screenshot `file.path` pattern or delivery path through `dns.question.name` and `destination.ip`.
    - $investigate_2
    - $investigate_3
  - Implication: broaden when the same user repeats screenshot capture or staging across hosts, or when the same host also shows suspicious precursor access, archive helpers, or alternate capture routines around the alert; keep scope narrow when both alert views stay confined to one approved launcher and bounded support or QA workflow.

- What disposition do the capture, execution, artifact, transfer, sensitivity, and scope findings support?
  - Focus: synthesize capture scope, storage or delivery behavior, recovered launch chain, user-host fit, file artifacts, session sensitivity, and related-alert scope.
  - Implication: escalate when the content and corroborating telemetry show unauthorized screen collection, staging, or transfer; close only when capture scope, launch context, artifacts, delivery signals, and surrounding scope all align with a documented benign support or test workflow; if answers remain mixed or visibility is incomplete, preserve artifacts and escalate rather than closing.

### False positive analysis

- Approved remote support or help-desk tooling can legitimately capture screenshots. Confirm it when the same `user.id`, `host.id`, recovered launcher, and internal transfer pattern align with a documented support ticket or tool inventory; if that context is unavailable, fall back to recurrence of the same launcher and transfer pattern in prior alerts from this rule. If the launcher, capture scope, or destination pattern breaks that workflow, do not close as benign.
- QA, UI regression testing, or accessibility automation can legitimately use screen-capture routines. Confirm it when reconstructed script content stays limited to bounded capture calls, the recovered parent chain maps to the test harness or accessibility tool, and written images remain in controlled test paths with no archive or external-delivery logic. If test documentation is unavailable, fall back to whether the same `user.id`, `host.id`, and launcher recur in a bounded pattern across prior alerts from this rule. If capture scope, launcher, artifact placement, or delivery behavior extends beyond that workflow, do not close as benign.
- Before creating an exception, validate that the same `user.id`, `host.id`, `file.path`, and a stable `powershell.file.script_block_text` substring recur across prior alerts from this rule. Avoid exceptions on screenshot-related strings alone, `user.name` alone, or the host alone.

### Response and remediation

- If confirmed benign, reverse any temporary containment and document the approved workflow evidence: the stable user-host pairing, recovered launch chain, and bounded internal capture or transfer path. Create an exception only if the same user, host, and launch context recur consistently across prior alerts from this rule.
- If suspicious but unconfirmed, preserve the reconstructed script content, recovered `process.entity_id`, written `file.path` artifacts, and any `dns.question.name` or `destination.ip` values linked to transfer. Apply reversible containment such as temporary egress restrictions or tighter monitoring on the exposed session. Escalate to host isolation only when capture, staging, or transfer evidence is strong and the host role can tolerate it. Avoid destructive cleanup until scope is clearer.
- If confirmed malicious, document the recovered `process.entity_id`, `process.command_line`, `process.parent.executable`, written `file.path` artifacts, and any confirmed `dns.question.name` or `destination.ip` values before initiating response actions. Use available endpoint response integrations to isolate the host and contain the affected account when capture scope, launch chain, artifacts, or delivery evidence shows unauthorized screen collection or transfer. If direct endpoint response is unavailable, escalate with the documented artifacts to the team that can act.
- If linked `dns.question.name`, `destination.ip`, or transfer artifacts confirm screenshot delivery or staging, block the confirmed destination, channel, or automation path before cleanup and preserve any related cloud, messaging, or remote-storage identifiers needed for follow-on scoping.
- If screenshots may have captured credentials, privileged sessions, or other sensitive on-screen data, follow the incident process for credential reset and access review for the exposed accounts or sessions, and review post-alert access from the same host or user for follow-on misuse.
- After containment, review related users and hosts for the same `powershell.file.script_block_text` content, `file.path` pattern, or `dns.question.name` destinations before eradicating. Remove confirmed staged scripts, screenshot artifacts, and transfer helpers. Restrict the execution path, such as tightening PowerShell execution policies or script-path allowlists.
- Retain PowerShell script block logging and related endpoint telemetry so the case remains auditable.
"""

setup = """## Setup

PowerShell Script Block Logging must be enabled to generate the events used by this rule (e.g., 4104).
Setup instructions: https://ela.st/powershell-logging-setup
"""

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "user.name",
    "user.id",
    "user.domain",
    "powershell.file.script_block_text",
    "powershell.file.script_block_id",
    "powershell.sequence",
    "powershell.total",
    "file.path",
    "file.directory",
    "file.name",
    "process.pid",
    "host.name",
    "host.id",
    "powershell.file.script_block_length"
]

[[transform.investigate]]
label = "Script block fragments for the same script"
description = ""
providers = [
  [
    { excluded = false, field = "powershell.file.script_block_id", queryType = "phrase", value = "{{powershell.file.script_block_id}}", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" }
  ]
]
relativeFrom = "now-1h"
relativeTo = "now"

[[transform.investigate]]
label = "Process events for the PowerShell instance"
description = ""
providers = [
  [
    { excluded = false, field = "process.pid", queryType = "phrase", value = "{{process.pid}}", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" },
    { excluded = false, field = "event.category", queryType = "phrase", value = "process", valueType = "string" }
  ]
]
relativeFrom = "now-1h"
relativeTo = "now"

[[transform.investigate]]
label = "Alerts associated with the user"
description = ""
providers = [
  [
    { excluded = false, field = "event.kind", queryType = "phrase", value = "signal", valueType = "string" },
    { excluded = false, field = "user.id", queryType = "phrase", value = "{{user.id}}", valueType = "string" }
  ]
]
relativeFrom = "now-48h/h"
relativeTo = "now"

[[transform.investigate]]
label = "Alerts associated with the host"
description = ""
providers = [
  [
    { excluded = false, field = "event.kind", queryType = "phrase", value = "signal", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" }
  ]
]
relativeFrom = "now-48h/h"
relativeTo = "now"

