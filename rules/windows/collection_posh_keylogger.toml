[metadata]
creation_date = "2021/10/15"
integration = ["windows"]
maturity = "production"
updated_date = "2026/03/30"

[rule]
author = ["Elastic"]
description = """
Detects PowerShell script block content that references Win32 keylogging primitives such as key state polling or
low-level input hooks. Adversaries use keylogging to capture credentials and other sensitive user input.
"""
from = "now-9m"
index = ["logs-windows.powershell*", "winlogbeat-*"]
language = "kuery"
license = "Elastic License v2"
name = "PowerShell Keylogging Script"
references = [
    "https://github.com/EmpireProject/Empire/blob/master/data/module_source/collection/Get-Keystrokes.ps1",
    "https://github.com/MojtabaTajik/FunnyKeylogger/blob/master/FunnyLogger.ps1",
]
risk_score = 73
rule_id = "bd2c86a0-8b61-4457-ab38-96943984e889"
severity = "high"
tags = [
    "Domain: Endpoint",
    "OS: Windows",
    "Use Case: Threat Detection",
    "Tactic: Collection",
    "Resources: Investigation Guide",
    "Data Source: PowerShell Logs",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
event.category:process and host.os.type:windows and
  (
    powershell.file.script_block_text : (GetAsyncKeyState or NtUserGetAsyncKeyState or GetKeyboardState or "Get-Keystrokes") or
    powershell.file.script_block_text : (
      (SetWindowsHookEx or SetWindowsHookExA or SetWindowsHookExW or NtUserSetWindowsHookEx) and
      (
        GetForegroundWindow or GetWindowTextA or GetWindowTextW or "WM_KEYBOARD_LL" or "WH_MOUSE_LL" or
        "WH_KEYBOARD_LL" or "LowLevelKeyboardProc" or "CallNextHookEx"
      )
   )
  ) and not user.id : "S-1-5-18" and
  not powershell.file.script_block_text : (
    "sentinelbreakpoints" and "Set-PSBreakpoint"
  )
'''

note = """## Triage and analysis

### Investigating PowerShell Keylogging Script

This alert fires when PowerShell script block logging preserves content associated with key-state polling, low-level keyboard hooks, or related input-capture routines. Treat it as evidence of attempted keylogging, not proof that keystrokes were successfully captured or exfiltrated. Prioritize what the preserved script content shows, whether the full script adds logging or delivery logic, and whether nearby process, file, network, and authentication telemetry show collection or post-capture use. Because the detection is string-driven, renamed hook functions or fragmented input-capture strings may only surface when you rebuild adjacent script blocks and correlate the logging, transfer, and authentication behavior.

#### Possible investigation steps

- Does the preserved script content show active keylogging intent rather than inert reference text?
  - Focus: the preserved script text on the alert, any associated `file.path`, and the alert scope from `@timestamp`, `host.id`, and `user.id`.
  - Implication: supports concern when the content clearly invokes polling loops, hook registration, window-labeling routines, output formatting, or commodity functions such as "Get-Keystrokes"; carries less weight when the text is clearly documentation, training content, or another inert reference with no adjacent execution evidence.

- Does reconstructing the full script reveal logging, labeling, staging, or transmission behavior that changes urgency?
  - Why: PowerShell script block logging can split one script across multiple records, and later fragments often reveal invocation flow, output paths, timer loops, or exfiltration that the matching fragment did not show.
  - Focus: `powershell.file.script_block_id`, `powershell.sequence`, `powershell.total`, and `powershell.file.script_block_length` needed to rebuild adjacent fragments, then the reconstructed content for foreground-window labeling, output files, archives, remote destinations, cleanup routines, or persistence helpers. $investigate_0
  - Implication: supports active collection when reconstruction shows continuous polling, registered hooks, keystroke formatting, saved logs, compression, upload logic, or cleanup after collection; is more explainable when the complete content resolves to a bounded accessibility, kiosk, or lab workflow with no hostile follow-on logic.

- Does the user-host pairing fit approved accessibility tooling, kiosk automation, hotkey software, or sanctioned security assessment?
  - Focus: the `user.id` and `host.id` pairing, whether the host role or asset classification supports input-capture tooling, and any prior alert recurrence from this rule for the same pairing and launcher.
  - Hint: if workflow documentation is unavailable, require the same `user.id`, `host.id`, and parent launch context to recur across prior alerts before treating the activity as benign.
  - Implication: more concerning if the user is a standard office user, the host handles privileged or sensitive workflows, or the timing is inconsistent with approved support or test activity; more explainable if the same pairing, schedule, and launch context match a documented kiosk, accessibility, or assessment workflow.

- Can you recover the PowerShell process and explain how it was launched?
  - Why: the preserved script content explains capability, but the launch chain determines whether it came from interactive admin work, a kiosk component, a scheduled task, or an unexpected parent.
  - Focus: same-host process events around the alert time, pivoting on the alert's `process.pid` and `host.id` to find the matching process start event, then `process.command_line`, `process.parent.executable`, `process.parent.command_line`, and `process.Ext.session_info.logon_type` to recover the launch context. $investigate_1
  - Hint: if the transform returns no process start event, try expanding the time window before concluding endpoint data is unavailable. If the process event still cannot be found, keep later file, network, and authentication review bounded to the same host and alert time rather than assuming a wider process scope.
  - Implication: supports unauthorized use when the recovered process is launched by a document, browser, chat client, remote session, or user-writable script path that does not fit the user; fits sanctioned activity when the launch chain stays inside the same approved kiosk, accessibility, support, or assessment workflow that legitimately uses input-capture tooling.

- Do nearby file events show keystroke logs, staged archives, or renamed artifacts consistent with collection?
  - Focus: same-host file events, preferably scoped to the recovered `process.entity_id`, with attention to `file.path`, `file.extension`, `file.Ext.header_bytes`, and `file.Ext.original.path` when logs or archives are renamed for staging.
  - Implication: supports active collection when log files, archives, or renamed artifacts appear in user-writable, hidden, or deceptive paths, or when the header bytes do not match the visible extension; is less concerning when file activity stays inside approved kiosk or accessibility-tool locations with no suspicious reuse.

- Do nearby network events show credential exfiltration, webhook delivery, or remote staging behavior?
  - Focus: same-host network events, preferably scoped to the recovered `process.entity_id`, and separated into DNS "lookup_result" evidence with `dns.question.name` and `dns.resolved_ip` versus connection events with `destination.ip` and `destination.port`.
  - Implication: suggests exfiltration or staging when the same process or host reaches rare public destinations, messaging or webhook services, cloud storage, or other transfer paths that do not fit the claimed workflow; keeps scope local when network activity is absent or stays limited to expected internal kiosk, support, proxy, or assessment infrastructure. Missing network telemetry is unresolved, not benign.

- Do authentication events tie this session to a suspicious origin or show later credential use after capture?
  - Why: keylogging becomes higher priority when the active session came from an unusual source or auth method, or when the same host or user is followed by new logons or explicit-credential use that could reflect captured input being used.
  - Focus: if `process.Ext.authentication_id` was recovered in the process step, bridge to `winlog.event_data.TargetLogonId` on the same `host.id` to recover `source.ip` and `winlog.event_data.AuthenticationPackageName` for the session origin. Independently, review post-alert authentication on the same `host.id` and `user.id` for new 4624 or 4648 events, checking `winlog.event_data.TargetUserName` and `winlog.event_data.TargetDomainName` for accounts that do not match the alert user or the host's expected access pattern.
  - Hint: "4648" explicit-credential events do not use `winlog.event_data.TargetLogonId`; if you need explicit-credential evidence, search `winlog.event_data.SubjectLogonId` or the same host and user after the alert instead of treating the bridge as complete.
  - Implication: suggests captured-input abuse when the bridged session has an unexpected origin or auth method, or when later "4624" or "4648" events show new remote, privileged, or explicit-credential activity that does not fit the user; is more explainable when the session origin and later authentication activity stay bounded to the same approved kiosk, accessibility, support, or assessment workflow.

- If the local or authentication evidence stays suspicious, do related alerts or repeated script content suggest broader compromise?
  - Focus: related alerts for the same `user.id` in the last 48 hours to find repeated collection, execution, or defense-evasion activity across other hosts or sessions. $investigate_2
  - Hint: compare related alerts for the same `host.id` and repeated preserved script substrings on this asset to look for persistence, repeated collection, follow-on staging, or renamed input-capture variants. $investigate_3
  - Implication: broaden the investigation when either view shows collection, execution, defense-evasion, persistence, or follow-on compromise outside the approved workflow; keep the case local when surrounding alerts and repeated script logic stay confined to the same documented kiosk, support, or test pattern.

- Do the content, launch, artifact, network, and authentication findings support unauthorized input capture or follow-on use?
  - Focus: script intent and reconstruction, user-host fit, recovered launch chain, keystroke artifacts, network delivery, authentication effects, and related-alert scope.
  - Implication: escalate when those evidence categories align on unauthorized input capture, staging, credential reuse, or transfer; close only when they all support a documented benign workflow with no contradictory findings; if answers remain mixed or visibility is incomplete, preserve artifacts and escalate rather than closing.

### False positive analysis

- Accessibility, kiosk, macro, or hotkey tooling can legitimately reference low-level input APIs. Confirm it only when reconstructed script content matches the approved workflow, the same `user.id` and `host.id` align with the expected operator or kiosk endpoint, and the recovered launch chain plus written log paths stay inside that same workflow. If workflow documentation is unavailable, require the same pairing and launcher to recur across prior alerts from this rule. If any of those elements point away from the workflow, do not close as benign.
- Security testing or malware-analysis workflows can legitimately include keylogging modules. Confirm it when the full script, related `file.path` artifacts, any `dns.question.name` or `destination.ip` evidence, and later authentication activity all stay inside a contained non-production workflow with no unexplained spread, credential use, or exfiltration. If test schedules are unavailable, fall back to whether the same `user.id`, `host.id`, and script content recur in a bounded pattern across prior alerts. If any of those conditions fail, do not close as benign.
- Before creating an exception, validate that the same `user.id`, `host.id`, `file.path`, and a stable `powershell.file.script_block_text` substring recur across prior alerts from this rule. Build the exception from that minimum confirmed workflow pattern. Avoid exceptions on hook-function strings alone, `user.name` alone, or the host alone.

### Response and remediation

- If confirmed benign, reverse any temporary containment and document the script content, recovered launch chain, user-host scope, and any benign artifact or destination pattern that proved the approved workflow. Create an exception only if the same workflow recurs consistently across prior alerts from this rule.
- If suspicious but unconfirmed, preserve the reconstructed script content, recovered `process.entity_id`, related `file.path` artifacts, any `dns.question.name` or `destination.ip` values linked to transfer, and authentication events around the alert. Apply reversible containment such as session restrictions or temporary destination blocking. Escalate to host isolation only when active collection, credential reuse, or transfer evidence is strong and the host role can tolerate it. Avoid destructive cleanup until scope is clearer.
- If confirmed malicious, document the recovered `process.entity_id`, `process.command_line`, `process.parent.executable`, written `file.path` artifacts, any confirmed `dns.question.name` or `destination.ip` values, and logon session details before initiating response actions. Prefer host isolation over process termination for initial containment when the asset can tolerate it, then contain affected accounts, block malicious destinations and scripts, and terminate recovered processes only after evidence capture.
- If keystroke logs, archives, or staging artifacts are identified, preserve them as sensitive evidence. Review related users and hosts for the same `powershell.file.script_block_text` content, `file.path` pattern, or `dns.question.name` destinations before eradicating. Then remove the artifacts and any persistence or automation identified during reconstruction or host-scoping.
- If follow-on authentication review suggests captured credentials were used, prioritize credential resets for the affected user and any additional accounts identified during the post-alert authentication timeline, then hunt for related sessions or privilege changes on the same host and other assets.
- After containment, restrict the execution path that allowed the script to run, such as tightening PowerShell execution policies or script-path allowlists. Retain PowerShell script block logging and related endpoint telemetry.
"""

setup = """## Setup

PowerShell Script Block Logging must be enabled to generate the events used by this rule (e.g., 4104).
Setup instructions: https://ela.st/powershell-logging-setup
"""

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "user.name",
    "user.id",
    "user.domain",
    "powershell.file.script_block_text",
    "powershell.file.script_block_id",
    "powershell.sequence",
    "powershell.total",
    "file.path",
    "file.directory",
    "file.name",
    "process.pid",
    "host.name",
    "host.id",
    "powershell.file.script_block_length"
]

[[transform.investigate]]
label = "Script block fragments for the same script"
description = ""
providers = [
  [
    { excluded = false, field = "powershell.file.script_block_id", queryType = "phrase", value = "{{powershell.file.script_block_id}}", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" }
  ]
]
relativeFrom = "now-1h"
relativeTo = "now"

[[transform.investigate]]
label = "Process events for the PowerShell instance"
description = ""
providers = [
  [
    { excluded = false, field = "process.pid", queryType = "phrase", value = "{{process.pid}}", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" },
    { excluded = false, field = "event.category", queryType = "phrase", value = "process", valueType = "string" }
  ]
]
relativeFrom = "now-1h"
relativeTo = "now"

[[transform.investigate]]
label = "Alerts associated with the user"
description = ""
providers = [
  [
    { excluded = false, field = "event.kind", queryType = "phrase", value = "signal", valueType = "string" },
    { excluded = false, field = "user.id", queryType = "phrase", value = "{{user.id}}", valueType = "string" }
  ]
]
relativeFrom = "now-48h/h"
relativeTo = "now"

[[transform.investigate]]
label = "Alerts associated with the host"
description = ""
providers = [
  [
    { excluded = false, field = "event.kind", queryType = "phrase", value = "signal", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" }
  ]
]
relativeFrom = "now-48h/h"
relativeTo = "now"

