[metadata]
creation_date = "2024/05/10"
integration = ["endpoint", "windows", "system", "m365_defender", "sentinel_one_cloud_funnel", "crowdstrike"]
maturity = "production"
updated_date = "2026/03/30"

[rule]
author = ["Elastic"]
description = """
Identifies the use of a browser to download a file from a remote URL when launched by a suspicious parent process.
Adversaries may use browsers to avoid ingress tool transfer restrictions.
"""
from = "now-9m"
index = [
    "endgame-*",
    "logs-crowdstrike.fdr*",
    "logs-endpoint.events.process-*",
    "logs-m365_defender.event-*",
    "logs-sentinel_one_cloud_funnel.*",
    "logs-system.security*",
    "logs-windows.forwarded*",
    "logs-windows.sysmon_operational-*",
    "winlogbeat-*",
]
language = "eql"
license = "Elastic License v2"
name = "Potential File Download via a Headless Browser"
references = ["https://lolbas-project.github.io/lolbas/Binaries/Msedge/"]
risk_score = 73
rule_id = "5f2f463e-6997-478c-8405-fb41cc283281"
severity = "high"
tags = [
    "Domain: Endpoint",
    "OS: Windows",
    "Use Case: Threat Detection",
    "Tactic: Command and Control",
    "Resources: Investigation Guide",
    "Data Source: Windows",
    "Data Source: Elastic Endgame",
    "Data Source: Elastic Defend",
    "Data Source: Windows Security Event Logs",
    "Data Source: Microsoft Defender for Endpoint",
    "Data Source: SentinelOne",
    "Data Source: Sysmon",
    "Data Source: Crowdstrike",
]
timestamp_override = "event.ingested"
type = "eql"

query = '''
process where host.os.type == "windows" and event.type == "start" and
  process.name : ("chrome.exe", "msedge.exe", "brave.exe", "browser.exe", "dragon.exe", "vivaldi.exe") and
  process.args : "--headless*" and
  process.args : ("--dump-dom", "*http*", "data:text/html;base64,*") and
  process.parent.name :
     ("cmd.exe", "powershell.exe", "wscript.exe", "cscript.exe", "mshta.exe", "conhost.exe", "msiexec.exe",
      "explorer.exe", "rundll32.exe", "winword.exe", "excel.exe", "onenote.exe", "hh.exe", "powerpnt.exe", "forfiles.exe",
      "pcalua.exe", "wmiprvse.exe") and
  not process.executable : (
        "?:\\inetpub\\wwwroot\\*\\ext\\modules\\html2pdf\\bin\\chrome\\*\\chrome-win64\\chrome.exe",
        "\\Device\\HarddiskVolume*\\inetpub\\wwwroot\\*\\ext\\modules\\html2pdf\\bin\\chrome\\*\\chrome-win64\\chrome.exe"
  )
'''

note = """## Triage and analysis

### Investigating Potential File Download via a Headless Browser

This alert fires when a browser starts in headless mode from a suspicious parent process and with arguments consistent with scripted retrieval or rendering. Attackers use headless browsers as ingress-tool-transfer proxies because the browser is a trusted, signed binary that application-control and proxy policies typically allow through, letting it fetch or decode content that direct download utilities would be blocked from retrieving. Treat it as evidence that a browser may be being abused as a download or staging utility, not proof that malware was retrieved. Prioritize whether the browser instance is legitimate automation, what the command line is trying to fetch or render, and whether the same process produced network and file activity consistent with payload delivery.

#### Possible investigation steps

- What headless pattern does the command line express, and is the browser the installed product?
  - Why: this rule fires on three distinct retrieval patterns -- fetching a remote URL to disk, decoding inline base64 HTML via "data:text/html;base64", or dumping rendered DOM via "--dump-dom". Identifying which pattern the command line uses changes what follow-on evidence matters.
  - Focus: `process.command_line`, `process.args`, and `process.working_directory`, with attention to remote URLs, "data:text/html;base64" content, "--dump-dom" usage, and redirected output paths. Confirm the browser is the installed product via `process.executable`, `process.code_signature.subject_name`, and `process.code_signature.trusted`.
  - Implication: retrieval intent is stronger when the command line pairs headless rendering flags with external content, inline base64 HTML, redirected output into unusual paths, and when the browser is unsigned, portable, or renamed; it is more explainable when the arguments match a rendering, QA, or report-generation workflow and the browser is the standard signed installation.

- Does the parent and ancestry explain why a browser is being driven headlessly?
  - Why: the same browser arguments mean different things when launched by a web-rendering service than when launched by a script host, Office application, or interactive shell.
  - Focus: `process.parent.executable`, `process.parent.command_line`, `process.Ext.ancestry`, and `process.Ext.session_info.logon_type`.
  - Implication: more concerning if the chain starts from a script host, Office process, MSI, WMI, or an interactive session that does not fit the user; more explainable if the ancestry resolves to a documented renderer, test harness, or application component already approved for that host role.

- Do network events show the browser reaching destinations consistent with the claimed workflow?
  - Focus: same-host network events scoped to the alert's `process.entity_id`, using `dns.resolved_ip` to bridge `dns.question.name` to `destination.ip` and treating `destination.as.organization.name` as ownership context rather than a verdict. $investigate_2
  - Hint: if `process.entity_id` is not available, stay on the same `host.id` and alert window and use `dns.question.name`, `dns.resolved_ip`, and `destination.ip` to test whether the browser likely reached the fetched content.
  - Implication: delivery risk increases when the same browser process reaches rare public destinations, direct download endpoints, or infrastructure unrelated to the claimed workflow, or when another process connects to an exposed debugging port; delivery risk falls when the destinations align with approved internal services, vendor rendering inputs, or known automation targets. Missing network telemetry is unresolved, not benign.

- Do file events or nearby child processes show downloaded, decoded, or staged artifacts from the browser?
  - Focus: file events and process activity on the same host, scoped to the alert's `process.entity_id`, with attention to `file.path`, `file.origin_url`, `file.Ext.windows.zone_identifier`, `file.Ext.header_bytes`, browser-child `process.parent.executable`, and later `process.executable` reuse of a written path.
  - Implication: artifact delivery is more likely when the browser writes decoded HTML, scripts, executables, archives, or renamed content to user-writable or deceptive paths, or when the browser spawns follow-on child processes or the written artifact later appears in execution telemetry; artifact evidence is less concerning when file output stays inside an expected renderer cache or temporary report directory with no suspicious reuse.

- Does the user-host pattern fit approved automation, server-side rendering, or testing workflow?
  - Focus: `user.id`, `host.id`, `process.executable`, `process.parent.executable`, and the destination pattern already established from `dns.question.name` or `destination.ip`.
  - Implication: workflow fit is weaker when the activity runs under a user or on a host that should not launch headless browsers, or when the timing and host role do not fit the claimed workflow; workflow fit improves when the same user-host pair and automation pattern align with a documented recurring workflow.

- If the local browser, destination, or artifact evidence stays suspicious or unresolved, does related alert history show isolated automation or broader download activity on this user or host?
  - Focus: related alerts for the same `host.id` and `user.id` in the last 48 hours to find sibling transfer tools, non-headless browser automation, or alternate renderer binaries that reuse the same destinations or stage similar outputs, and to test whether the same execution pattern follows the user across hosts.
    - $investigate_0
    - $investigate_1
  - Implication: broaden when the same user repeats suspicious delivery or command-and-control behavior across hosts, or when the same host reuses the same destinations or artifacts through sibling tools or non-headless browser automation; keep scope narrow when both alert views stay confined to one approved automation component.

- What disposition do the browser, command-line, destination, artifact, workflow, and scope findings support?
  - Focus: weigh `process.executable`, `process.command_line`, `process.parent.executable`, `dns.question.name`, `destination.ip`, and `file.path` together, then use related `user.id` or `host.id` alerts only to decide whether the activity is isolated or broader.
  - Implication: escalate when the evidence shows unauthorized headless browsing, suspicious destinations, or downloaded or staged artifacts; close only when browser identity, destination fit, artifacts, and workflow context all align with a documented benign automation pattern.

### False positive analysis

- Server-side rendering, web testing, or browser automation can legitimately start a headless browser with retrieval arguments. Confirm it when `process.executable`, `process.parent.executable`, and the `dns.question.name` or `destination.ip` pattern all align with one automation component. If automation records are unavailable, require the same browser, parent, and destination pattern to recur across prior alerts before treating it as benign.
- Threat-research, QA, or sandbox workflows can intentionally retrieve content through a headless browser. Confirm it when `dns.question.name`, `destination.ip`, and written `file.path` artifacts all stay inside a contained test scope on the same `host.id` with no unexpected execution or persistence. If test records are unavailable, require the same destination and host pattern to recur across prior alerts.
- Before creating an exception, build on stable fields: `process.executable`, `process.parent.executable`, `process.code_signature.subject_name`, and `host.id` or `user.id`. Avoid exceptions on `process.name` alone, the "--headless" flag alone, or `host.id` alone.

### Response and remediation

- If confirmed benign, reverse any temporary containment and document the `process.executable`, `process.parent.executable`, `process.command_line`, destination pattern from `dns.question.name` or `destination.ip`, and recurring `user.id` / `host.id` scope that proved the workflow. Create an exception only if that same pattern recurs consistently across prior alerts from this rule.
- If suspicious but unconfirmed, first preserve the alert's `process.entity_id`, `process.command_line`, related `file.path` outputs, `file.origin_url` provenance, and any linked `dns.question.name`, `dns.resolved_ip`, or `destination.ip` values. Then apply reversible containment such as temporary egress blocks or tighter monitoring of the affected `user.id` or `host.id`. Escalate to host isolation only when the browser, network, or artifact evidence shows material delivery or staging risk.
- If confirmed malicious, document the alert's `process.entity_id`, `process.command_line`, `process.parent.command_line`, written `file.path` artifacts, `process.hash.sha256`, and confirmed `dns.question.name` or `destination.ip` values before initiating response actions. Prefer endpoint isolation as the first containment step, weighing the host's role before isolating critical infrastructure such as servers, domain controllers, or build systems. If direct endpoint response is unavailable, escalate with the preserved artifact set to the team that can act.
- After containment, review other `host.id` and `user.id` alerts for the same `dns.question.name`, `destination.ip`, or `process.executable` pattern before deleting artifacts or restoring access. Then block the malicious destinations and downloaded artifact hashes identified during the investigation, eradicate the scripts, archives, browsers, or persistence artifacts uncovered during the artifact and scope review, and remediate the launcher, automation component, or execution-control gap that allowed the headless browser to retrieve content.
"""

