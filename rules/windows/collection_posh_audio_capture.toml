[metadata]
creation_date = "2021/10/19"
integration = ["windows"]
maturity = "production"
updated_date = "2026/03/30"

[rule]
author = ["Elastic"]
description = """
Detects PowerShell script block content that invokes microphone capture routines or WinMM audio APIs.
Adversaries may use audio recording to surveil users or capture sensitive conversations for theft or extortion.
"""
from = "now-9m"
index = ["logs-windows.powershell*", "winlogbeat-*"]
language = "kuery"
license = "Elastic License v2"
name = "PowerShell Suspicious Script with Audio Capture Capabilities"
references = ["https://github.com/PowerShellMafia/PowerSploit/blob/master/Exfiltration/Get-MicrophoneAudio.ps1"]
risk_score = 73
rule_id = "2f2f4939-0b34-40c2-a0a3-844eb7889f43"
severity = "high"
tags = [
    "Domain: Endpoint",
    "OS: Windows",
    "Use Case: Threat Detection",
    "Tactic: Collection",
    "Resources: Investigation Guide",
    "Data Source: PowerShell Logs",
]
timestamp_override = "event.ingested"
type = "query"

query = '''
event.category:process and host.os.type:windows and
  powershell.file.script_block_text : (
    "Get-MicrophoneAudio" or
    ("Get-AudioDevice" and "Recording" and "Set-AudioDevice") or
    "WindowsAudioDevice-Powershell-Cmdlet" or
    (
      "winmm.dll" and
      (
        "waveInGetNumDevs" or "waveInOpen" or "waveInStart" or
        "mciSendString" or "mciSendStringA" or "mciSendStringW"
      )
    )
  ) and
  not powershell.file.script_block_text : (
    "sentinelbreakpoints" and "Set-PSBreakpoint" and "PowerSploitIndicators"
  )
'''

note = """## Triage and analysis

### Investigating PowerShell Suspicious Script with Audio Capture Capabilities

This alert fires when PowerShell script block logging captures content associated with microphone recording or Windows audio-capture APIs. Treat it as evidence of collection capability, not proof that recording succeeded. Prioritize what the preserved script content shows, whether the full script adds staging or transfer logic, and whether nearby process, file, and network telemetry support actual collection activity. Because the detection is string-driven, renamed microphone functions or fragmented WinMM API strings may only surface when you rebuild adjacent script blocks and correlate the output-file and transfer behavior.

#### Possible investigation steps

- Does the preserved script content show live microphone capture logic rather than inert reference text?
  - Focus: the preserved script text on the alert, any associated `file.path`, and the alert scope from `@timestamp`, `host.id`, and `user.id`.
  - Implication: supports concern when the content invokes recording routines, output paths, duration controls, or upload logic; carries less weight when the text is clearly inert example material, documentation, or approved test content with no adjacent execution evidence.

- Does reconstructing the full script reveal staging, timers, cleanup, or transfer behavior that changes urgency?
  - Why: PowerShell script block logging can split one script across multiple records, and later fragments often reveal save locations, loop logic, or exfiltration that the matching fragment did not show.
  - Focus: `powershell.file.script_block_id`, `powershell.sequence`, `powershell.total`, and `powershell.file.script_block_length` needed to rebuild adjacent fragments, then the reconstructed content for output paths, encoding steps, remote destinations, or cleanup logic. $investigate_0
  - Implication: supports active collection when reconstruction shows repeated capture loops, hidden staging paths, compression, upload, persistence, or cleanup after collection; is more explainable when the full script stays inside contained lab or accessibility-test content with no hostile follow-on logic.

- Does the user-host pairing fit approved accessibility testing, media tooling, or sanctioned security assessment?
  - Focus: the `user.id` and `host.id` pairing, whether the host role or asset classification supports microphone access, and any prior alert recurrence from this rule for the same pairing and launcher.
  - Hint: if workflow documentation is unavailable, require the same `user.id`, `host.id`, and parent launch context to recur across prior alerts before treating the activity as benign.
  - Implication: more concerning if the user has no documented reason for audio access, the host handles privileged or sensitive workflows, or the timing falls outside approved testing; more explainable if the same pairing, schedule, and launch context match a documented QA, support, or red-team workflow.

- Can you recover the PowerShell process and explain how it was launched?
  - Why: the script content explains capability, but the launch chain explains whether it came from interactive admin work, automation, or an unexpected parent.
  - Focus: same-host process events around the alert time, pivoting on the alert's `process.pid` and `host.id` to find the matching process start event, then `process.command_line`, `process.parent.executable`, `process.parent.command_line`, and `process.Ext.session_info.logon_type` to recover the launch context. $investigate_1
  - Hint: if the transform returns no process start event, try expanding the time window before concluding endpoint data is unavailable. If the process event still cannot be found, keep later file and network review bounded to the same host and alert time rather than assuming a wider process scope.
  - Implication: supports unauthorized use when the recovered process is launched by a document, browser, chat client, scheduled task, remote session, or user-writable script path that does not fit the user; fits sanctioned activity when the launch chain stays inside the same approved QA, support, accessibility, or assessment workflow that legitimately uses microphone access.

- Do nearby file events show recorded audio or staging artifacts consistent with collection?
  - Focus: same-host file events, preferably scoped to the recovered `process.entity_id`, with attention to `file.path`, `file.extension`, `file.Ext.header_bytes`, and `file.Ext.original.path` when media files or archives are renamed for staging.
  - Implication: supports active collection when media files, deceptive extensions, archives, or renamed payloads appear in user-writable or hidden paths, or when written artifacts are later executed or uploaded; is less concerning when file activity stays inside approved media-test or support-tool locations with no suspicious reuse.

- Do nearby network events show outbound transfer or second-stage behavior consistent with captured audio leaving the host?
  - Focus: same-host network events, preferably scoped to the recovered `process.entity_id`, and separated into DNS "lookup_result" evidence with `dns.question.name` and `dns.resolved_ip` versus connection events with `destination.ip` and `destination.port`.
  - Implication: suggests follow-on transfer when the same process or host reaches rare public destinations, cloud storage, messaging services, or other transfer paths that do not fit the claimed workflow; keeps scope local when network activity is absent or stays limited to expected internal media-test, proxy, or support-transfer infrastructure. Missing network telemetry is unresolved, not benign.

- If the local evidence stays suspicious, do related alerts or repeated script-block activity suggest broader compromise?
  - Focus: related alerts for the same `user.id` in the last 48 hours to find repeated collection, execution, or defense-evasion activity across other hosts or sessions. $investigate_2
  - Hint: compare related alerts for the same `host.id` and repeated preserved script substrings on this asset to look for persistence, repeated collection, follow-on staging, or renamed audio-capture variants. $investigate_3
  - Implication: broaden the investigation when either view shows collection, execution, defense-evasion, persistence, or transfer activity outside the approved workflow; keep the case local when surrounding alerts and repeated script logic stay confined to the same documented test or support pattern.

- Do the content, launch, artifact, network, and scope findings support unauthorized audio collection or transfer?
  - Focus: script intent and reconstruction, user-host fit, recovered launch chain, recorded or staged artifacts, outbound transfer signals, and related-alert scope.
  - Implication: escalate when those evidence categories align on unauthorized audio collection, staging, or transfer; close only when they all support a documented benign workflow with no contradictory findings; if answers remain mixed or visibility is incomplete, preserve artifacts and escalate rather than closing.

### False positive analysis

- Accessibility or QA automation can legitimately access microphones. Confirm it only when reconstructed script content matches the approved workflow, the same `user.id` and `host.id` align with the expected operator or test endpoint, and the recovered launch chain and written media paths stay inside that same workflow. If workflow documentation is unavailable, require the same pairing and launcher to recur across prior alerts from this rule. If any of those elements point away from the workflow, do not close as benign.
- Red-team, lab, or security-tool validation can include audio-capture modules. Confirm it when the full script, related `file.path` artifacts, and any `dns.question.name` or `destination.ip` evidence stay inside a contained non-production test with no unexplained spread, upload, or repeated script-block activity outside the planned window. If test schedules are unavailable, fall back to whether the same `user.id`, `host.id`, and script content recur in a bounded pattern across prior alerts. If any of those conditions fail, do not close as benign.
- Before creating an exception, validate that the same `user.id`, `host.id`, `file.path`, and a stable `powershell.file.script_block_text` substring recur across prior alerts from this rule. Build the exception from that minimum confirmed workflow pattern. Avoid exceptions on audio API strings alone, `user.name` alone, or the host alone.

### Response and remediation

- If confirmed benign, reverse any temporary containment and document the script content, recovered launch chain, user-host scope, and any benign file or destination pattern that proved the approved workflow. Create an exception only if the same workflow recurs consistently across prior alerts from this rule.
- If suspicious but unconfirmed, preserve the reconstructed script content, recovered `process.entity_id`, related `file.path` artifacts, and any `dns.question.name` or `destination.ip` values linked to transfer. Apply reversible containment such as temporary destination blocking or session restrictions. Escalate to host isolation only when active collection or transfer evidence is strong and the host role can tolerate it. Avoid destructive cleanup until scope is clearer.
- If confirmed malicious, document the recovered `process.entity_id`, `process.command_line`, `process.parent.executable`, written `file.path` artifacts, and any confirmed `dns.question.name` or `destination.ip` values before initiating response actions. Use available endpoint response integrations to isolate the host (preferred over process termination for initial containment when the asset can tolerate it), then block confirmed malicious destinations and scripts. If direct endpoint response is unavailable, escalate with the documented artifacts to the team that can act. If the captured audio may have exposed sensitive conversations or privileged sessions, initiate access review for the affected accounts.
- If recorded audio files or staging archives are identified, preserve them according to privacy and evidence-handling requirements. Review related users and hosts for the same `powershell.file.script_block_text` content, `file.path` pattern, or `dns.question.name` destinations before eradicating. Then remove the artifacts and any persistence or automation identified during reconstruction or host-scoping.
- After containment, restrict the execution path that allowed the script to run, such as tightening PowerShell execution policies or script-path allowlists. Retain PowerShell script block logging and related endpoint telemetry.
"""

setup = """## Setup

PowerShell Script Block Logging must be enabled to generate the events used by this rule (e.g., 4104).
Setup instructions: https://ela.st/powershell-logging-setup
"""

[rule.investigation_fields]
field_names = [
    "@timestamp",
    "user.name",
    "user.id",
    "user.domain",
    "powershell.file.script_block_text",
    "powershell.file.script_block_id",
    "powershell.sequence",
    "powershell.total",
    "file.path",
    "file.directory",
    "file.name",
    "process.pid",
    "host.name",
    "host.id",
    "powershell.file.script_block_length"
]

[[transform.investigate]]
label = "Script block fragments for the same script"
description = ""
providers = [
  [
    { excluded = false, field = "powershell.file.script_block_id", queryType = "phrase", value = "{{powershell.file.script_block_id}}", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" }
  ]
]
relativeFrom = "now-1h"
relativeTo = "now"

[[transform.investigate]]
label = "Process events for the PowerShell instance"
description = ""
providers = [
  [
    { excluded = false, field = "process.pid", queryType = "phrase", value = "{{process.pid}}", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" },
    { excluded = false, field = "event.category", queryType = "phrase", value = "process", valueType = "string" }
  ]
]
relativeFrom = "now-1h"
relativeTo = "now"

[[transform.investigate]]
label = "Alerts associated with the user"
description = ""
providers = [
  [
    { excluded = false, field = "event.kind", queryType = "phrase", value = "signal", valueType = "string" },
    { excluded = false, field = "user.id", queryType = "phrase", value = "{{user.id}}", valueType = "string" }
  ]
]
relativeFrom = "now-48h/h"
relativeTo = "now"

[[transform.investigate]]
label = "Alerts associated with the host"
description = ""
providers = [
  [
    { excluded = false, field = "event.kind", queryType = "phrase", value = "signal", valueType = "string" },
    { excluded = false, field = "host.id", queryType = "phrase", value = "{{host.id}}", valueType = "string" }
  ]
]
relativeFrom = "now-48h/h"
relativeTo = "now"

