[metadata]
creation_date = "2026/04/29"
integration = ["auditd_manager"]
maturity = "production"
updated_date = "2026/04/29"

[rule]
author = ["Elastic"]
description = """
Identifies one or more AF_ALG (Linux kernel crypto) socket creations by the same non-root user and process name on a
Linux host. AF_ALG socket creation is the core primitive used by the "Copy Fail" exploit for CVE-2026-31431. Legitimate
unprivileged AF_ALG usage is rare, and successful exploitation can lead to local privilege escalation or container
escape by corrupting the page cache of a readable setuid-root binary.
"""
false_positives = [
    """
    Legitimate AF_ALG usage from unprivileged users is uncommon, but some kernel crypto tests, IPsec helpers, disk
    encryption tooling, HSM integrations, or approved security research systems may exercise this interface. Verify the
    process, user, and host role before adding an exception.
    """,
]
from = "now-9m"
index = ["auditbeat-*", "logs-auditd_manager.auditd-*"]
language = "kuery"
license = "Elastic License v2"
name = "Unprivileged AF_ALG Socket Creation Threshold"
note = """## Triage and analysis

### Investigating Unprivileged AF_ALG Socket Creation Threshold

Copy Fail (CVE-2026-31431) abuses the Linux kernel `authencesn` AEAD path through AF_ALG and `splice()` to write four controlled bytes into the page cache of a readable file. Public exploitation targets setuid-root binaries such as `/usr/bin/su`, then executes the corrupted in-memory copy to gain root. The file on disk is not modified, so traditional on-disk integrity checks may miss the activity.

This threshold rule groups non-root AF_ALG socket creation (`socket(38, ...)`, represented as `auditd.data.a0:26` in auditd telemetry) by host, user, and process name. The threshold is intentionally low because unprivileged AF_ALG use is rare and a single creation can be enough for exploitation.

### Possible investigation steps

- Review the grouped `host.id`, `user.id`, and `process.name` values in the alert, then inspect the original events for `process.executable`, `process.command_line`, parent process details, and working directory.
- Pivot on the same host and user around the alert time for `splice`, `sendmsg`, `recvmsg`, and execution of setuid-root binaries such as `/usr/bin/su`, `/usr/bin/sudo`, `/usr/bin/passwd`, `/usr/bin/mount`, `/usr/bin/newgrp`, `/usr/bin/gpasswd`, or `/usr/bin/chfn`.
- Look for a UID transition to root from the same process tree shortly after the AF_ALG socket creation.
- If the process is an interpreter, collect the script content and look for `socket.socket(38, 5, 0)`, `authencesn`, `os.splice`, or `MSG_MORE`.
- Check container fields such as `container.id` and `container.image.name`. Because this primitive abuses the shared host page cache, container-originated activity should be treated as a possible node-compromise attempt.

### False positive analysis

Legitimate unprivileged AF_ALG consumers are rare. Validate whether the activity comes from documented kernel crypto testing, disk encryption tooling, IPsec helpers, HSM integration software, or approved research systems. Add narrow exceptions only after confirming the executable, user, and host role.

### Response and remediation

- Isolate the host if unauthorized AF_ALG activity cannot be quickly ruled out. Treat confirmed exploitation as root compromise.
- Terminate the alerting process and preserve memory, scripts, shell history, and temporary files.
- Inspect setuid-root binaries that may have been targeted. Remember that the vulnerable write affects the page cache, not the on-disk file.
- Patch the kernel with the vendor fix for CVE-2026-31431. Until patched, consider blocking `algif_aead` module loading or restricting AF_ALG socket creation via seccomp for untrusted workloads.
- For containerized environments, patch the underlying node kernel. Rebuilding container images does not remediate the host kernel vulnerability.
"""
references = [
    "https://xint.io/blog/copy-fail-linux-distributions",
    "https://nvd.nist.gov/vuln/detail/CVE-2026-31431",
    "https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git/commit/?id=a664bf3d603d",
    "https://www.kernel.org/doc/html/latest/crypto/userspace-if.html",
]
risk_score = 73
rule_id = "1c28becc-ec0b-4e6d-81a5-899d00348089"
setup = """## Setup

This rule requires data coming in from one of the following integrations:
- Auditbeat
- Auditd Manager

### Auditd Manager Integration Setup
The Auditd Manager integration receives audit events from the Linux Audit Framework, which is part of the Linux kernel.

#### Rule Specific Setup Note
This detection relies on the `socket` syscall being audited. If your environment uses a minimal audit ruleset, add a rule similar to the following in the integration's "audit rules" configuration so the socket syscall is captured:

```
-a always,exit -F arch=b64 -S socket -k af_alg_socket
-a always,exit -F arch=b32 -S socketcall -k af_alg_socket
```
"""
severity = "high"
tags = [
    "Domain: Endpoint",
    "OS: Linux",
    "Use Case: Threat Detection",
    "Use Case: Vulnerability",
    "Tactic: Privilege Escalation",
    "Data Source: Auditd Manager",
    "Resources: Investigation Guide",
]
timestamp_override = "event.ingested"
type = "threshold"

query = '''
event.category:process and host.os.type:linux and auditd.data.syscall:socket and auditd.data.a0:26 and
not user.id:"0" and
not process.name:(
  "cryptsetup" or "systemd-cryptsetup" or "veritysetup" or "integritysetup" or
  "charon" or "pluto" or "ipsec" or "strongswan" or "swanctl" or
  "tcrypt" or "cryptd" or "tpm2-abrmd"
)
'''


[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id = "T1068"
name = "Exploitation for Privilege Escalation"
reference = "https://attack.mitre.org/techniques/T1068/"

[[rule.threat.technique]]
id = "T1548"
name = "Abuse Elevation Control Mechanism"
reference = "https://attack.mitre.org/techniques/T1548/"
[[rule.threat.technique.subtechnique]]
id = "T1548.001"
name = "Setuid and Setgid"
reference = "https://attack.mitre.org/techniques/T1548/001/"



[rule.threat.tactic]
id = "TA0004"
name = "Privilege Escalation"
reference = "https://attack.mitre.org/tactics/TA0004/"

[rule.threshold]
field = ["host.name", "user.name", "process.name"]
value = 1

