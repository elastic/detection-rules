[rule.investigation_fields]
field_names = [
    "@timestamp",
    "user.email",
    "user.name",
    "source.ip",
    "source.as.number",
    "source.as.organization.name",
    "source.geo.country_name",
    "google_workspace.login.type",
    "google_workspace.login.challenge_method",
    "google_workspace.login.is_suspicious",
]

